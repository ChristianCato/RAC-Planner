<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RAC Media Planner — Enhance Media</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  /* Official RAC brand palette */
  --rac-orange: #FF6600;
  --rac-orange-dk: #E55A00;
  --rac-orange-tint: #FFF2E6;
  --rac-navy: #003366;
  --rac-navy-dk: #00264D;
  --rac-navy-tint: #E6ECF2;
  --rac-blue-light: #3275B2;
  --rac-amber: #FBAA29;
  --rac-grey-1: #ADB0A9;
  --rac-grey-2: #88817D;
  /* Enhance Media palette — dark primary + light blue accent */
  --em-black: #0B0B0B;
  --em-blue: #4DADE3;
  --em-blue-dk: #2E8FC5;
  /* Neutrals */
  --paper: #F6F7F9;
  --card: #FFFFFF;
  --ink: #111318;
  --ink-70: #111318B3;
  --ink-55: #1113188C;
  --ink-35: #11131859;
  --ink-15: #11131826;
  --ink-08: #11131814;
  --ink-04: #1113180A;
  --line: #003366_1F;
  --line-c: #E4E7EC;
  --line-strong: #CFD4DB;
  --good: #0E7C3A;
  --good-bg: #0E7C3A12;
  --amber: #B66A00;
  --amber-bg: #B66A0012;
  --bad: #B82318;
  --bad-bg: #B8231812;
  --sidebar-w: 248px;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
  background: var(--paper);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  letter-spacing: -0.005em;
}
.num, .mono { font-family: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Monaco, monospace; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
h1, h2, h3, h4, h5 { font-family: "Inter", "Helvetica Neue", Helvetica, sans-serif; letter-spacing: -0.02em; }

/* ===== App shell ===== */
.app-shell {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  min-height: 100vh;
}

/* === Sidebar (Enhance Media dark aesthetic) === */
.sidebar {
  background: var(--em-black);
  color: #fff;
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow: hidden;
}
/* Decorative light-blue circle — nod to Enhance Media visual language */
.sidebar::before {
  content: '';
  position: absolute;
  bottom: -80px;
  right: -80px;
  width: 220px;
  height: 220px;
  border-radius: 50%;
  background: var(--em-blue);
  opacity: 0.12;
  z-index: 0;
  pointer-events: none;
}
.sidebar::after {
  content: '';
  position: absolute;
  top: 320px;
  left: -40px;
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 1px solid var(--em-blue);
  opacity: 0.25;
  z-index: 0;
  pointer-events: none;
}

.sidebar-brand {
  padding: 24px 24px 20px;
  border-bottom: 1px solid #ffffff12;
  position: relative;
  z-index: 1;
}
.sidebar-rac-logo {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  background: var(--rac-orange);
  padding: 8px 14px;
  border-radius: 3px;
  font-family: "Inter", "Helvetica Neue", sans-serif;
  font-weight: 700;
  font-size: 26px;
  color: #fff;
  letter-spacing: -0.03em;
  line-height: 1;
}
.sidebar-tagline {
  margin-top: 14px;
  font-size: 11px;
  color: #ffffffb5;
  font-weight: 500;
  letter-spacing: 0.2px;
  line-height: 1.5;
}
.sidebar-agency {
  margin-top: 10px;
  font-size: 10px;
  color: #ffffff70;
  letter-spacing: 0.5px;
}
.sidebar-agency strong {
  color: var(--em-blue);
  font-weight: 600;
  letter-spacing: 0.3px;
}

.sidebar-nav {
  flex: 1;
  padding: 18px 12px;
  overflow-y: auto;
  position: relative;
  z-index: 1;
}
.sidebar-section-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.4px;
  color: #ffffff55;
  font-weight: 600;
  padding: 14px 14px 8px;
}
.sidebar-nav button {
  display: flex;
  width: 100%;
  align-items: center;
  gap: 12px;
  border: 0;
  background: transparent;
  color: #ffffffc5;
  padding: 10px 14px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  text-align: left;
  border-radius: 6px;
  margin-bottom: 2px;
  position: relative;
  transition: background 0.12s ease, color 0.12s ease;
}
.sidebar-nav button:hover { background: #ffffff0d; color: #fff; }
.sidebar-nav button.active {
  background: #ffffff10;
  color: #fff;
  font-weight: 600;
}
.sidebar-nav button.active::before {
  content: '';
  position: absolute;
  left: -12px;
  top: 8px; bottom: 8px;
  width: 3px;
  background: var(--rac-orange);
  border-radius: 0 2px 2px 0;
}
.nav-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #ffffff40;
  flex-shrink: 0;
}
.sidebar-nav button.active .nav-dot { background: var(--rac-orange); box-shadow: 0 0 0 3px #FF660020; }

.sidebar-foot {
  padding: 14px 24px;
  border-top: 1px solid #ffffff12;
  font-size: 11px;
  color: #ffffff70;
  line-height: 1.5;
  position: relative;
  z-index: 1;
}
.freshness-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #6FD296; margin-right: 6px; vertical-align: middle; }

/* === Content === */
.content { background: var(--paper); min-width: 0; }

.subheader {
  background: var(--card);
  border-bottom: 1px solid var(--line-c);
  padding: 20px 32px;
  display: flex;
  align-items: center;
  gap: 24px;
  flex-wrap: wrap;
}
.month-picker-wrap { position: relative; }
.month-picker-btn {
  border: 1px solid var(--line-strong);
  background: var(--card);
  padding: 8px 16px 8px 14px;
  border-radius: 8px;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  text-align: left;
  min-width: 220px;
  transition: border-color 0.12s ease, box-shadow 0.12s ease;
}
.month-picker-btn:hover { border-color: var(--rac-navy); }
.mp-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.3px;
  color: var(--ink-55);
  font-weight: 600;
  display: block;
  margin-bottom: 2px;
}
.mp-val {
  font-size: 17px;
  font-weight: 600;
  color: var(--rac-navy);
  letter-spacing: -0.02em;
  line-height: 1.2;
}
.mp-chev { margin-left: auto; color: var(--ink-55); font-size: 10px; }
.month-picker-dropdown {
  position: absolute;
  top: 100%; left: 0;
  margin-top: 4px;
  background: var(--card);
  border: 1px solid var(--line-strong);
  border-radius: 8px;
  box-shadow: 0 8px 24px #11131815;
  min-width: 280px;
  z-index: 100;
  display: grid;
  grid-template-columns: 1fr 1fr;
  padding: 6px;
}
.month-picker-dropdown button {
  border: 0; background: transparent;
  padding: 8px 12px;
  font-family: inherit;
  text-align: left; cursor: pointer;
  border-radius: 4px;
  font-size: 13px;
  color: var(--ink);
  font-weight: 500;
}
.month-picker-dropdown button:hover { background: var(--ink-04); }
.month-picker-dropdown button.active { background: var(--rac-navy); color: #fff; }

.role-toggle, .platform-toggle {
  display: inline-flex;
  background: var(--ink-04);
  padding: 3px;
  border-radius: 999px;
  border: 1px solid var(--line-c);
}
.role-toggle button, .platform-toggle button {
  border: 0; background: transparent;
  padding: 7px 16px;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-55);
  cursor: pointer;
  border-radius: 999px;
  font-family: inherit;
}
.role-toggle button.active, .platform-toggle button.active { background: var(--rac-navy); color: #fff; }
.platform-toggle button.active[data-platform="meta"] { background: var(--em-black); }

.toggle-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.3px;
  color: var(--ink-55);
  font-weight: 600;
  margin-right: 2px;
}

.subheader-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.btn {
  font-family: inherit;
  font-size: 12.5px;
  font-weight: 600;
  padding: 8px 14px;
  border-radius: 6px;
  border: 1px solid var(--line-strong);
  background: var(--card);
  color: var(--ink);
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
}
.btn:hover { background: var(--ink-04); }
.btn-primary { background: var(--rac-navy); color: #fff; border-color: var(--rac-navy); }
.btn-primary:hover { background: var(--rac-navy-dk); }
.btn-secondary { background: #f1f3f6; color: #4a5263; border-color: #cfd4dc; }
.btn-secondary:hover { background: #e4e7ec; border-color: #aab4c0; }
.btn-accent { background: var(--rac-orange); color: #fff; border-color: var(--rac-orange); }
.btn-accent:hover { background: var(--rac-orange-dk); }
.btn-sm { font-size: 11.5px; padding: 5px 10px; }
.btn-ghost { background: transparent; border-color: transparent; }
.btn-ghost:hover { background: var(--ink-04); }

/* Export PDF dropdown */
.export-dropdown-wrap { display: inline-block; }
.btn-export-pdf { background: var(--rac-orange); color: #fff; border-color: var(--rac-orange); font-weight: 600; }
.btn-export-pdf:hover { background: var(--rac-orange-dk); }
.export-dropdown-menu {
  position: absolute;
  top: calc(100% + 4px);
  right: 0;
  background: #fff;
  border: 1px solid var(--line-c);
  border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  min-width: 280px;
  z-index: 100;
  overflow: hidden;
}
.export-dropdown-item {
  display: block;
  width: 100%;
  padding: 12px 14px;
  background: #fff;
  border: none;
  border-bottom: 1px solid var(--line-c);
  text-align: left;
  cursor: pointer;
  transition: background 0.12s;
}
.export-dropdown-item:last-child { border-bottom: none; }
.export-dropdown-item:hover { background: var(--ink-04); }
.export-dropdown-item-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--rac-navy);
  margin-bottom: 3px;
}
.export-dropdown-item-sub {
  font-size: 11.5px;
  color: var(--ink-55);
  line-height: 1.35;
}

.main { padding: 28px 32px 60px; max-width: 1440px; }

/* === Banners === */
.banner {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 14px 18px;
  border-radius: 8px;
  font-size: 13.5px;
  margin-bottom: 20px;
  line-height: 1.55;
}
.banner-amber { background: var(--amber-bg); color: #7A4800; border-left: 3px solid var(--amber); }
.banner-bad { background: var(--bad-bg); color: #7A1813; border-left: 3px solid var(--bad); }
.banner-info { background: #4DADE312; color: var(--em-blue-dk); border-left: 3px solid var(--em-blue); }
.banner-icon {
  flex-shrink: 0;
  width: 20px; height: 20px;
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  background: currentColor;
  color: #fff !important;
  margin-top: 1px;
}
.banner-body { flex: 1; }
.banner-body strong { font-weight: 600; color: var(--ink); }
.banner-amber .banner-body strong { color: #5A3600; }
.banner-bad .banner-body strong { color: #5A110B; }

/* === KPI grid === */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 14px;
  margin-bottom: 24px;
}
.kpi {
  background: var(--card);
  padding: 18px 20px;
  border: 1px solid var(--line-c);
  border-radius: 10px;
  position: relative;
}
.kpi-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.3px;
  color: var(--ink-55);
  font-weight: 600;
  margin-bottom: 8px;
}
.kpi-value {
  font-size: 28px;
  font-weight: 700;
  color: var(--rac-navy);
  line-height: 1.1;
  letter-spacing: -0.03em;
  font-feature-settings: "tnum" 1;
}
.kpi-split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed var(--line-c);
}
.kpi-split-item {
  display: flex;
  flex-direction: column;
}
.kpi-split-item .lbl {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--ink-55);
  font-weight: 600;
  line-height: 1.3;
}
.kpi-split-item .lbl.smr { color: var(--rac-orange-dk); }
.kpi-split-item .lbl.patrol { color: var(--em-blue-dk); }
.kpi-split-item .val {
  font-family: "JetBrains Mono", monospace;
  font-variant-numeric: tabular-nums;
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  margin-top: 2px;
  letter-spacing: -0.02em;
}
.kpi-sub { font-size: 12px; color: var(--ink-55); margin-top: 6px; }
.kpi-status { position: absolute; top: 16px; right: 18px; width: 8px; height: 8px; border-radius: 50%; }
.kpi-status.good { background: var(--good); }
.kpi-status.amber { background: var(--amber); }
.kpi-status.bad { background: var(--bad); }

/* === Sections === */
.section { background: var(--card); border: 1px solid var(--line-c); border-radius: 10px; margin-bottom: 20px; }
.section-head {
  padding: 16px 22px;
  border-bottom: 1px solid var(--line-c);
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}
.section-title {
  font-size: 17px;
  font-weight: 600;
  color: var(--rac-navy);
  line-height: 1.2;
  letter-spacing: -0.02em;
}
.section-sub {
  font-size: 11.5px;
  color: var(--ink-55);
  margin-left: auto;
  display: flex;
  gap: 8px;
  align-items: center;
  font-weight: 500;
}
.section-body { padding: 20px 22px; }
.section-body-flush { padding: 0; }

/* === Tables === */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-family: "JetBrains Mono", monospace;
  font-variant-numeric: tabular-nums;
  font-size: 12.5px;
  letter-spacing: -0.02em;
}
.data-table thead th {
  background: var(--ink-04);
  padding: 11px 14px;
  text-align: right;
  font-weight: 600;
  border-bottom: 1px solid var(--line-c);
  color: var(--ink-55);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 1px;
  white-space: nowrap;
  font-family: "Inter", sans-serif;
}
.data-table thead th:first-child { text-align: left; }
.data-table tbody td {
  padding: 11px 14px;
  text-align: right;
  border-bottom: 1px solid var(--line-c);
  vertical-align: middle;
}
.data-table tbody td:first-child { text-align: left; font-family: "Inter", sans-serif; font-weight: 500; letter-spacing: -0.005em; }
.data-table tbody tr:hover { background: var(--ink-04); }
.data-table tbody tr.total-row td { font-weight: 700; background: var(--ink-04); border-top: 2px solid var(--rac-navy); }
.data-table tbody td.dim { color: var(--ink-35); }

.conf-pill {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  font-family: "Inter", sans-serif;
}
.conf-high { background: var(--good-bg); color: var(--good); }
.conf-med { background: var(--amber-bg); color: var(--amber); }
.conf-low { background: var(--bad-bg); color: var(--bad); }

.eff-badge { 
  display: inline-block;
  padding: 2px 7px;
  border-radius: 4px;
  font-size: 9.5px;
  font-weight: 700;
  margin-left: 6px;
  letter-spacing: 0.3px;
  font-family: "Inter", sans-serif;
}
.eff-best { background: var(--good-bg); color: var(--good); }
.eff-worst { background: var(--bad-bg); color: var(--bad); }

/* === Allocation === */
.alloc-grid {
  display: grid;
  grid-template-columns: 1.4fr auto 0.9fr 0.8fr 0.8fr 0.6fr 0.6fr;
  gap: 0;
  align-items: center;
}
.alloc-row { display: contents; }
.alloc-row > div {
  padding: 11px 14px;
  border-bottom: 1px solid var(--line-c);
  font-family: "JetBrains Mono", monospace;
  font-variant-numeric: tabular-nums;
  font-size: 12.5px;
  text-align: right;
  letter-spacing: -0.02em;
}
.alloc-row > div:first-child {
  font-family: "Inter", sans-serif;
  font-weight: 500;
  text-align: left;
  letter-spacing: -0.005em;
}
.alloc-header > div {
  background: var(--ink-04);
  padding: 11px 14px;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--ink-55);
  font-weight: 600;
  border-bottom: 1px solid var(--line-c);
  font-family: "Inter", sans-serif;
  text-align: right;
}
.alloc-header > div:first-child { text-align: left; }
.alloc-row.dim-row > div { opacity: 0.5; }

.slider-cell { padding: 8px 14px !important; }
.slider-wrap { display: flex; align-items: center; gap: 8px; }
.slider-wrap input[type=range] { flex: 1; height: 4px; accent-color: var(--rac-orange); cursor: pointer; }
.slider-input {
  width: 92px;
  padding: 6px 9px;
  border: 1px solid var(--line-strong);
  border-radius: 5px;
  font-family: "JetBrains Mono", monospace;
  font-variant-numeric: tabular-nums;
  font-size: 11.5px;
  text-align: right;
  background: var(--card);
  letter-spacing: -0.02em;
}
.lock-btn {
  width: 26px; height: 26px; 
  border: 1px solid var(--line-strong); 
  background: var(--card);
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
  padding: 0;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--ink-55);
}
.lock-btn.locked { background: var(--rac-navy); color: #fff; border-color: var(--rac-navy); }

/* === Mode selector (three allocation strategies) === */
.mode-selector {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 16px 22px 12px;
}
.mode-card {
  padding: 14px 16px;
  border: 1.5px solid var(--line-c);
  border-radius: 10px;
  background: var(--card);
  cursor: pointer;
  transition: all 0.15s ease;
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 6px;
  text-align: left;
  font-family: inherit;
}
.mode-card:hover { border-color: var(--rac-navy); background: var(--rac-navy-tint); }
.mode-card.active { 
  border-color: var(--rac-orange); 
  background: var(--rac-orange-tint);
  box-shadow: 0 0 0 3px #FF660020;
}
.mode-card.active .mode-glyph { background: var(--rac-orange); color: #fff; }
.mode-glyph {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--ink-04);
  color: var(--rac-navy);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: -0.02em;
  flex-shrink: 0;
  transition: all 0.15s;
}
.mode-title {
  font-weight: 600;
  font-size: 13.5px;
  letter-spacing: -0.015em;
  color: var(--rac-navy);
}
.mode-desc {
  font-size: 11.5px;
  color: var(--ink-55);
  line-height: 1.45;
}
.mode-outcome {
  margin-top: 2px;
  padding-top: 8px;
  border-top: 1px dashed var(--line-c);
  font-family: "JetBrains Mono", monospace;
  font-size: 11.5px;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
}
.mode-outcome strong { color: var(--rac-navy); font-weight: 600; }

/* Pills */
.pill {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 999px;
  background: var(--ink-04);
  font-size: 11.5px;
  color: var(--ink-55);
  font-weight: 500;
}
.pill-good { background: var(--good-bg); color: var(--good); }
.pill-bad { background: var(--bad-bg); color: var(--bad); }
.pill-warn { background: var(--amber-bg); color: var(--amber); }

/* Info tag + popover */
.info-tag {
  display: inline-flex; align-items: center; justify-content: center;
  width: 15px; height: 15px;
  font-size: 10px;
  color: var(--ink-55);
  border: 1px solid var(--line-strong);
  border-radius: 50%;
  cursor: pointer;
  margin-left: 6px;
  font-family: "Inter", serif;
  font-style: italic;
  font-weight: 600;
}
.info-tag:hover { background: var(--rac-navy); color: #fff; border-color: var(--rac-navy); }
.popover-backdrop { position: fixed; inset: 0; background: #0B0B0B33; z-index: 999; }
.popover {
  position: fixed; z-index: 1000;
  background: var(--card);
  padding: 16px 20px 18px;
  border: 1px solid var(--line-strong);
  border-radius: 10px;
  box-shadow: 0 12px 40px #11131830;
  width: 340px;
  max-width: calc(100vw - 24px);
  max-height: calc(100vh - 24px);
  overflow-y: auto;
  box-sizing: border-box;
  font-size: 13px;
  line-height: 1.55;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
.popover h5 {
  margin: 0 0 6px;
  font-weight: 600;
  font-size: 15px;
  color: var(--rac-navy);
  letter-spacing: -0.01em;
}
.popover p { margin: 0 0 6px; color: var(--ink-70); }
.popover .popover-close {
  position: absolute; top: 10px; right: 12px;
  border: 0; background: transparent; cursor: pointer;
  font-size: 16px; color: var(--ink-55); line-height: 1;
}

/* Targets */
.target-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 900px) { .target-grid { grid-template-columns: 1fr; } }
.target-card {

  padding: 20px 22px;
}

  text-transform: uppercase;
  letter-spacing: 1.4px;
  padding: 4px 10px;
  border-radius: 4px;
  background: var(--rac-orange);
  color: #fff;
  font-weight: 700;
  margin-bottom: 12px;
}
.role-badge.patrol { background: var(--em-blue-dk); }
.target-row {
  display: grid;
  grid-template-columns: 1fr auto;
  padding: 11px 0;
  border-bottom: 1px dashed var(--line-c);
  font-size: 13px;
}
.target-row:last-child { border-bottom: 0; }
.target-row-label { color: var(--ink-70); }
.target-row-value { font-family: "JetBrains Mono", monospace; font-variant-numeric: tabular-nums; font-weight: 600; letter-spacing: -0.02em; }

/* Notes */
.notes-area {
  width: 100%;
  min-height: 240px;
  font-family: "Inter", sans-serif;
  font-size: 13.5px;
  padding: 16px;
  border: 1px solid var(--line-strong);
  border-radius: 8px;
  resize: vertical;
  line-height: 1.6;
}
.small-meta { font-size: 11.5px; color: var(--ink-55); }

/* Scenarios */
.scenario-row {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr auto;
  padding: 12px 14px;
  border-bottom: 1px solid var(--line-c);
  align-items: center;
  font-size: 13px;
}
.scenario-row:hover { background: var(--ink-04); }

/* Chart */
.chart-wrap { height: 300px; position: relative; }

/* Footer */
.app-footer {
  padding: 20px 32px 32px;
  text-align: left;
  font-size: 11.5px;
  color: var(--ink-35);
  letter-spacing: 0.1px;
}
.app-footer strong { color: var(--em-blue-dk); font-weight: 600; }

/* Mobile */
@media (max-width: 840px) {
  .app-shell { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; }
  .sidebar::before, .sidebar::after { display: none; }
  .sidebar-nav { display: flex; flex-wrap: wrap; padding: 8px; }
  .sidebar-section-label { display: none; }
  .sidebar-nav button { flex-shrink: 0; white-space: nowrap; }
  .sidebar-nav button.active::before { display: none; }
  .main { padding: 20px; }
  .subheader { padding: 14px 20px; gap: 12px; }
  .mode-selector { grid-template-columns: 1fr; }

  margin-top: auto;
  width: 100%;
  padding: 10px 16px;
  font-size: 13px;
}

.conf-pill.clickable { cursor: pointer; transition: all 0.12s; }
.conf-pill.clickable:hover { opacity: 0.82; transform: translateY(-1px); }
.info-tag:hover { background: var(--ink-04); color: var(--ink); border-color: var(--ink-55); }
.conf-pill.clickable:hover { opacity: 0.8; }


/* Insights panel */
.insights {
  background: var(--card);
  border: 1px solid var(--line-c);
  border-radius: 10px;
  margin-bottom: 20px;
  overflow: hidden;
}
.insights-head {
  padding: 14px 22px;
  background: linear-gradient(90deg, var(--rac-navy-tint), transparent);
  border-bottom: 1px solid var(--line-c);
  display: flex;
  align-items: center;
  gap: 10px;
}
.insights-head h3 {
  margin: 0;
  font-size: 15px;
  font-weight: 600;
  color: var(--rac-navy);
  letter-spacing: -0.01em;
}
.insights-head .small-meta { margin-left: auto; }
.insight-item {
  padding: 12px 22px;
  border-bottom: 1px solid var(--line-c);
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.insight-item:last-child { border-bottom: 0; }
.insight-icon {
  flex-shrink: 0;
  width: 22px; height: 22px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: #fff;
  margin-top: 1px;
}
.insight-item.warn .insight-icon { background: var(--amber); }
.insight-item.bad .insight-icon { background: var(--bad); }
.insight-item.good .insight-icon { background: var(--good); }
.insight-item.info .insight-icon { background: var(--em-blue-dk); }
.insight-body {
  flex: 1;
  font-size: 13px;
  line-height: 1.55;
  color: var(--ink);
}
.insight-body strong { font-weight: 600; }
.insight-body .mono { font-weight: 600; color: var(--rac-navy); }


/* ========== Benchmarks tab ========== */
.bench-pivot {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  font-variant-numeric: tabular-nums;
}
.bench-pivot thead th {
  background: var(--ink-04);
  padding: 11px 14px;
  text-align: right;
  font-weight: 600;
  border-bottom: 1px solid var(--line-c);
  color: var(--ink-55);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 1px;
  white-space: nowrap;
  font-family: "Inter", sans-serif;
}
.bench-pivot thead th:first-child { text-align: left; }
.bench-pivot tbody td {
  padding: 10px 14px;
  text-align: right;
  border-bottom: 1px solid var(--line-c);
  font-family: "JetBrains Mono", monospace;
  font-size: 11.5px;
  letter-spacing: -0.02em;
}
.bench-pivot tbody td:first-child {
  text-align: left;
  font-family: "Inter", sans-serif;
  font-weight: 500;
  letter-spacing: -0.005em;
  font-size: 12.5px;
}
.bench-pivot tbody tr.total-row td {
  background: var(--ink-04);
  border-top: 2px solid var(--rac-navy);
  font-weight: 700;
  color: var(--rac-navy);
}
.bench-pivot tbody tr:hover td:not(.pivot-cell) { background: rgba(255, 102, 0, 0.03); }

/* Pivot heat-cells: direct rgba() background, readable text */
.bench-pivot tbody td.pivot-cell {
  transition: background-color 0.15s ease;
}
.bench-pivot tbody td.pivot-cell.no-data {
  color: var(--ink-35);
  background-color: transparent !important;
}
.bench-pivot tbody td.pivot-cell.best {
  font-weight: 700;
  color: var(--rac-navy);
}

/* Metric toggle (CPH / CPA / CVR / Spend / Hires switcher) */
.metric-toggle {
  display: inline-flex;
  background: var(--ink-04);
  padding: 3px;
  border-radius: 999px;
  border: 1px solid var(--line-c);
  gap: 2px;
}
.metric-toggle button {
  border: 0;
  background: transparent;
  padding: 5px 12px;
  font-size: 11px;
  font-weight: 600;
  color: var(--ink-55);
  cursor: pointer;
  border-radius: 999px;
  font-family: inherit;
  letter-spacing: 0.5px;
}
.metric-toggle button:hover { color: var(--ink); }
.metric-toggle button.active {
  background: var(--rac-navy);
  color: #fff;
}
.toggle-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--ink-55);
  font-weight: 600;
  margin-right: 10px;
}


/* Allocation rationale — plain-English "why this split" */
.rationale-box {
  margin: 0 22px 14px;
  padding: 14px 16px 12px;
  background: linear-gradient(180deg, #FFF4E6 0%, #FFF9F0 100%);
  border: 1px solid #FFD9A8;
  border-left: 4px solid var(--rac-orange);
  border-radius: 8px;
}
.rationale-box.empty {
  background: var(--ink-04);
  border-color: var(--line-c);
  border-left: 4px solid var(--ink-35);
  font-size: 13px;
  color: var(--ink-70);
  padding: 16px 18px;
}
.rationale-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  font-weight: 700;
  color: var(--rac-navy);
  margin-bottom: 8px;
}
.rationale-body p {
  margin: 0 0 7px;
  font-size: 13px;
  line-height: 1.55;
  color: var(--ink);
}
.rationale-body p:last-child { margin-bottom: 0; }
.rationale-body strong { font-weight: 600; color: var(--rac-navy); }
.rationale-body .rationale-zero {
  color: var(--ink-55);
  font-size: 12.5px;
  font-style: italic;
}
.rationale-body .rationale-footer {
  padding-top: 7px;
  border-top: 1px dashed #FFD9A8;
  color: var(--ink-55);
  font-size: 12px;
}

/* Indeed Premium explainer panel */
.premium-explainer {
  background: linear-gradient(180deg, #E8F1FA 0%, #F4F9FD 100%);
  border: 1px solid #B8D4EA;
  border-left: 4px solid var(--rac-blue-2);
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 16px;
}
.premium-explainer-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--rac-navy);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
}
.premium-explainer-body p {
  margin: 0 0 10px;
  font-size: 13px;
  line-height: 1.55;
  color: var(--ink);
}
.premium-explainer-body ul {
  margin: 0;
  padding-left: 18px;
}
.premium-explainer-body li {
  font-size: 12.5px;
  line-height: 1.6;
  color: var(--ink-70);
  margin-bottom: 3px;
}
.premium-explainer-body strong {
  font-weight: 600;
  color: var(--rac-navy);
}

/* Budget & Strategy control */
.bsc-panel {
  background: var(--card);
  border: 1px solid var(--line-c);
  border-radius: 10px;
  padding: 0;
  margin-bottom: 18px;
  overflow: hidden;
}
.bsc-head {
  padding: 14px 20px 12px;
  border-bottom: 1px solid var(--line-c);
  background: var(--ink-04);
}
.bsc-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.3px;
  font-weight: 700;
  color: var(--rac-navy);
  margin-bottom: 4px;
}
.bsc-sub {
  font-size: 12.5px;
  color: var(--ink-55);
  line-height: 1.5;
}
.bsc-grid {
  display: grid;
  gap: 0;
}
.bsc-role-card {
  padding: 18px 20px;
  border-right: 1px solid var(--line-c);
}
.bsc-role-card:last-child { border-right: none; }
.bsc-role-head {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}
.strategy-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: 0.2px;
}
.strategy-pill-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  display: inline-block;
  background: currentColor;
}
.strategy-fill { background: #E8F1FA; color: #1960A0; }
.strategy-max { background: #FFF4E6; color: #C25500; }
.strategy-custom { background: #F0EBF7; color: #6B3BA8; }
.strategy-none { background: var(--ink-04); color: var(--ink-55); }
.bsc-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 12px 14px;
  background: var(--ink-04);
  border-radius: 8px;
  margin-bottom: 14px;
}
.bsc-stat-label {
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--ink-55);
  margin-bottom: 3px;
}
.bsc-stat-value {
  font-family: "JetBrains Mono", monospace;
  font-size: 17px;
  font-weight: 700;
  color: var(--rac-navy);
  letter-spacing: -0.02em;
}
.bsc-stat-sub {
  font-size: 11px;
  color: var(--ink-55);
  margin-top: 2px;
}
.bsc-stat-sub.good { color: var(--good); }
.bsc-stat-sub.bad { color: var(--bad); }
.bsc-strategy-switcher {
  border-top: 1px solid var(--line-c);
  padding-top: 12px;
}
.bsc-switcher-label {
  font-size: 10.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--ink-55);
  margin-bottom: 8px;
}
.bsc-switcher-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.bsc-max-budget, .bsc-fill-info {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 10px;
}
.bsc-max-budget label, .bsc-fill-info label {
  font-size: 12px;
  color: var(--ink-70);
  flex: 1;
}
.bsc-max-budget input {
  width: 110px;
  font-size: 13px;
  font-weight: 600;
}
.bsc-fill-info .mono {
  font-weight: 700;
  color: var(--rac-navy);
}
.bsc-reset-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 6px;
}

/* Clickable target pill */
.target-pill-clickable {
  cursor: pointer;
  border-bottom: 1px dotted currentColor;
  transition: opacity 0.15s;
}
.target-pill-clickable:hover { opacity: 0.75; }

/* Fill rate quick-set */
.fill-rate-card {
  border: 1px solid var(--line-c);
  border-radius: 8px;
  padding: 16px 18px;
  background: var(--card);
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.fill-rate-head {
  display: flex;
  align-items: center;
  gap: 10px;
}
.fill-rate-band {
  margin-left: auto;
  font-size: 10.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  padding: 3px 9px;
  border-radius: 999px;
  background: var(--ink-04);
  color: var(--rac-navy);
}
.fill-rate-main-stat {
  padding: 12px 14px;
  background: linear-gradient(180deg, #FFF4E6 0%, #FFFAF2 100%);
  border: 1px solid #FFD9A8;
  border-radius: 6px;
}
.fill-rate-label {
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.9px;
  color: var(--ink-55);
  font-weight: 700;
}
.fill-rate-target-input {
  width: 70px;
  font-family: "JetBrains Mono", monospace;
  font-size: 28px;
  font-weight: 700;
  color: var(--rac-navy);
  letter-spacing: -0.02em;
  border: 1px solid var(--line-c);
  background: var(--card);
  border-radius: 6px;
  padding: 4px 10px;
  text-align: center;
}
.fill-rate-target-input:focus {
  outline: none;
  border-color: var(--rac-orange);
  box-shadow: 0 0 0 3px rgba(255,102,0,0.12);
}
.fill-rate-pct {
  margin-left: auto;
  font-family: "JetBrains Mono", monospace;
  font-size: 14px;
  font-weight: 700;
  color: var(--rac-orange);
}
.fill-rate-slider {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.fill-rate-slider input[type=range] {
  width: 100%;
  accent-color: var(--rac-orange);
}
.fill-rate-preset-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.fill-rate-preset {
  background: var(--ink-04);
  border: 1px solid var(--line-c);
  border-radius: 6px;
  padding: 8px 6px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.12s;
  text-align: center;
}
.fill-rate-preset:hover {
  border-color: var(--rac-orange);
  background: #FFF4E6;
}
.fill-rate-preset.active {
  border-color: var(--rac-orange);
  background: var(--rac-orange);
  color: white;
}
.fill-rate-preset.active .preset-rate,
.fill-rate-preset.active .preset-label,
.fill-rate-preset.active .preset-hires { color: white; }
.preset-rate {
  font-family: "JetBrains Mono", monospace;
  font-size: 15px;
  font-weight: 700;
  color: var(--rac-navy);
  letter-spacing: -0.02em;
}
.preset-label {
  font-size: 10.5px;
  font-weight: 600;
  color: var(--ink);
  margin-top: 2px;
}
.preset-hires {
  font-size: 10px;
  color: var(--ink-55);
  margin-top: 2px;
  font-family: "JetBrains Mono", monospace;
}
.fill-rate-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 8px;
  border-top: 1px dashed var(--line-c);
  font-size: 11.5px;
  color: var(--ink-55);
}
.fill-rate-footer strong { font-weight: 600; color: var(--rac-navy); }

/* At-a-glance ribbon */
.ribbon {
  background: linear-gradient(135deg, #003366 0%, #0A4175 100%);
  color: white;
  border-radius: 12px;
  padding: 20px 24px;
  margin-bottom: 18px;
  box-shadow: 0 4px 16px rgba(0, 51, 102, 0.15);
}
.ribbon-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 10px;
}
.ribbon-title {
  display: flex;
  align-items: baseline;
  gap: 12px;
}
.ribbon-month {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.015em;
  color: white;
}
.ribbon-role {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1.3px;
  color: rgba(255,255,255,0.6);
  font-weight: 600;
}
.ribbon-status {
  padding: 6px 14px;
  border-radius: 999px;
  font-size: 12.5px;
  font-weight: 700;
  letter-spacing: 0.3px;
}
.ribbon-status.ok {
  background: rgba(74, 189, 106, 0.22);
  color: #9BE8AE;
  border: 1px solid rgba(74, 189, 106, 0.4);
}
.ribbon-status.short {
  background: rgba(251, 170, 41, 0.22);
  color: #FDCE75;
  border: 1px solid rgba(251, 170, 41, 0.5);
}
.ribbon-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1.7fr;
  gap: 24px;
  align-items: start;
}
.ribbon-stat-label {
  font-size: 10.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: rgba(255,255,255,0.55);
  margin-bottom: 6px;
}
.ribbon-stat-value {
  font-family: "JetBrains Mono", monospace;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: white;
  line-height: 1.15;
}
.ribbon-stat-sub {
  font-size: 11.5px;
  color: rgba(255,255,255,0.6);
  margin-top: 4px;
}
.ribbon-progress-wrap {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.ribbon-progress {
  height: 14px;
  background: rgba(255,255,255,0.12);
  border-radius: 999px;
  overflow: hidden;
  position: relative;
}
.ribbon-progress-fill {
  height: 100%;
  border-radius: 999px;
  transition: width 0.35s ease;
}
.ribbon-progress-fill.ok {
  background: linear-gradient(90deg, #4ABD6A 0%, #6ED88A 100%);
}
.ribbon-progress-fill.short {
  background: linear-gradient(90deg, #FBAA29 0%, #FF6600 100%);
}
.ribbon-progress-marks {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: rgba(255,255,255,0.5);
  font-family: "JetBrains Mono", monospace;
}

/* Switcher toggle + drawer */
.bsc-strategy-switcher {
  border-top: 1px solid var(--line-c);
  margin-top: 12px;
  padding-top: 0;
}
.bsc-switcher-toggle {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  border: 0;
  background: transparent;
  cursor: pointer;
  padding: 10px 0 0;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  color: var(--rac-navy);
}
.bsc-switcher-toggle:hover { color: var(--rac-orange); }
.bsc-switcher-toggle .small-meta {
  font-size: 11px;
  font-style: italic;
  color: var(--ink-55);
  font-weight: 400;
}
.bsc-switcher-body {
  padding-top: 10px;
}

/* SuperFlex inclusion tag */
.superflex-tag {
  font-size: 9.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--rac-orange);
  background: rgba(255, 102, 0, 0.1);
  padding: 2px 6px;
  border-radius: 3px;
  margin-left: 4px;
  display: inline-block;
  vertical-align: 2px;
}

/* Strategy realism bar */
.realism-bar {
  padding: 10px 14px 11px;
  border-radius: 6px;
  background: var(--ink-04);
  border: 1px solid var(--line-c);
  margin: 10px 0 12px;
}
.realism-bar.realism-good { border-color: rgba(74,189,106,0.35); background: #F1F9F3; }
.realism-bar.realism-warn { border-color: rgba(251,170,41,0.4); background: #FFF8EC; }
.realism-bar.realism-bad { border-color: rgba(184,35,24,0.35); background: #FDF3F1; }
.realism-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.realism-label {
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 700;
  color: var(--ink-55);
}
.realism-score {
  font-size: 12.5px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  border-bottom: 1px dotted currentColor;
}
.realism-bar.realism-good .realism-score { color: var(--good); }
.realism-bar.realism-warn .realism-score { color: var(--amber-dk, #9B6A10); }
.realism-bar.realism-bad .realism-score { color: var(--bad); }
.realism-track {
  height: 8px;
  background: rgba(0,0,0,0.05);
  border-radius: 999px;
  overflow: hidden;
}
.realism-fill {
  height: 100%;
  border-radius: 999px;
  transition: width 0.4s ease;
}
.realism-fill-good { background: linear-gradient(90deg, #4ABD6A, #6ED88A); }
.realism-fill-warn { background: linear-gradient(90deg, #FBAA29, #F1981A); }
.realism-fill-bad { background: linear-gradient(90deg, #B82318, #D64A3E); }

/* Allocation overview charts */
.alloc-overview {
  background: var(--card);
  border: 1px solid var(--line-c);
  border-radius: 10px;
  padding: 18px 22px;
  margin-bottom: 16px;
}
.alloc-overview-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line-c);
}
.alloc-overview-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--rac-navy);
  letter-spacing: -0.01em;
}
.alloc-overview-sub {
  font-size: 12px;
  color: var(--ink-55);
  margin-top: 2px;
}
.alloc-overview-grid {
  display: grid;
  grid-template-columns: 1fr 1.4fr;
  gap: 20px;
}
.alloc-overview-panel {}
.alloc-overview-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.9px;
  font-weight: 700;
  color: var(--ink-55);
  margin-bottom: 4px;
}
.alloc-overview-empty {
  background: var(--ink-04);
  border: 1px dashed var(--line-c);
  border-radius: 10px;
  padding: 16px 22px;
  margin-bottom: 16px;
  font-size: 13px;
  color: var(--ink-70);
}
@media (max-width: 900px) {
  .alloc-overview-grid { grid-template-columns: 1fr; }
}

.rationale-zero-block {
  background: rgba(0,0,0,0.03);
  border-left: 3px solid var(--ink-35);
  padding: 10px 14px;
  border-radius: 4px;
  margin: 10px 0;
}
.rationale-zero-head {
  font-size: 11.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--ink-55);
  margin-bottom: 6px;
}
.rationale-zero-list {
  margin: 0;
  padding-left: 18px;
  font-size: 12.5px;
  line-height: 1.6;
}
.rationale-zero-list li { margin-bottom: 3px; }
.rationale-flag {
  background: #FFF4E6;
  border-left: 3px solid var(--rac-orange);
  padding: 10px 14px;
  border-radius: 4px;
  font-size: 12.5px;
  line-height: 1.6;
  margin-top: 10px;
}

.rationale-region-block {
  background: #FFF4E6;
  border-left: 3px solid var(--rac-orange);
  padding: 10px 14px;
  border-radius: 4px;
  margin-top: 10px;
}

/* Dashboard target chart */
.dash-chart-card {
  background: var(--card);
  border: 1px solid var(--line-c);
  border-radius: 10px;
  padding: 18px 22px 14px;
  margin-bottom: 16px;
}
.dash-chart-head {
  margin-bottom: 10px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--line-c);
}
.dash-chart-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--rac-navy);
  letter-spacing: -0.01em;
}
.dash-chart-sub {
  font-size: 12px;
  color: var(--ink-55);
  margin-top: 2px;
}
.dash-chart-canvas {
  position: relative;
  width: 100%;
}
.dash-chart-captions {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px dashed var(--line-c);
  font-size: 12.5px;
  line-height: 1.6;
  color: var(--ink-70);
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.kpi-grid-slim {
  grid-template-columns: 1fr 1fr !important;
}
@media (max-width: 700px) {
  .kpi-grid-slim { grid-template-columns: 1fr !important; }
}

/* Collapsible section headers */
.section-head-collapsible {
  cursor: pointer;
  transition: background 0.12s;
}
.section-head-collapsible:hover {
  background: rgba(0,0,0,0.02);
}
.collapse-chevron {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: var(--rac-orange);
  width: 24px;
  height: 24px;
  border-radius: 5px;
  background: rgba(255, 102, 0, 0.08);
  flex-shrink: 0;
  transition: all 0.15s;
  line-height: 1;

.section-head-collapsible:hover .collapse-chevron,
.platform-grid-header:hover .collapse-chevron,
.bsc-head-collapsible:hover .collapse-chevron,

  color: var(--rac-orange);
}

  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--line-c);
  cursor: pointer;
  transition: background 0.12s;
}
.platform-grid-header:hover {
  background: rgba(0,0,0,0.02);
}
.platform-grid-header:hover .collapse-chevron {
  color: var(--rac-orange);
}
.platform-collapse-all {
  padding: 10px 22px;
  border-top: 1px dashed var(--line-c);
  background: var(--ink-04);
  display: flex;
  justify-content: flex-end;

.bsc-head-collapsible {
  cursor: pointer;
  display: flex !important;
  align-items: center;
  gap: 12px;
  transition: background 0.12s;
  position: relative;
}
.bsc-head-collapsible:hover {
  background: rgba(0,0,0,0.02);
}
.bsc-head-collapsible:hover .collapse-chevron {
  color: var(--rac-orange);
}
.bsc-collapsed-summary {
  margin-left: auto;

  gap: 8px;

  background: var(--paper);

  color: var(--ink-70);

  color: var(--rac-navy);

.feasibility-intro {

  padding: 12px 16px;
  border-radius: 4px;

  line-height: 1.55;

.feasibility-intro em { color: var(--rac-orange); font-style: normal; font-weight: 600; }

.fstat-label {

  font-weight: 600;
  color: var(--ink-55);

  line-height: 1.3;
}
.fstat-note {
  font-weight: 400;

  letter-spacing: 0;
  color: var(--ink-35);
}
.fstat-value {
  font-size: 20px;
  font-weight: 700;
  color: var(--rac-navy);
  letter-spacing: -0.01em;
  line-height: 1.1;
}
.fstat-sub {

  line-height: 1.3;

  color: var(--rac-navy);
}

}

  font-weight: 600;
  text-transform: uppercase;

  color: var(--ink-55);
  border-bottom: 1px solid var(--line-c);

}
.feasibility-table tbody tr:last-child td { border-bottom: none; }
.feasibility-row-highlight { background: #FFF4E6; }
.feasibility-row-highlight td:first-child { border-left: 3px solid var(--rac-orange); }
.delta-bad { color: var(--bad); font-weight: 600; }
.delta-good { color: var(--good); font-weight: 600; }

  line-height: 1.55;

  font-weight: 600;
