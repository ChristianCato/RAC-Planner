<script type="text/babel" data-type="module">
const { useState, useEffect, useMemo, useRef, useCallback, useContext, createContext } = React;
const DATA = window.__APP_DATA__;
const PLATFORMS = ['indeed', 'meta', 'google', 'appcast'];
const PLATFORM_LABELS = { indeed: 'Indeed', meta: 'Meta', google: 'Google', appcast: 'Appcast' };

// Default per-role exposure minimums. Applied per-role (so if both SMR & Patrol are live,
// Indeed's effective monthly floor is ~2× the per-role number). Editable on Dashboard.
const DEFAULT_PLATFORM_MINIMUMS = {
  indeed: 3000,
  meta: 1500,
  google: 0,
  appcast: 0,
};

function loadPlatformMinimums() {
  const saved = localStorage.getItem('rac-platform-minimums-v1');
  if (saved) {
    try { return { ...DEFAULT_PLATFORM_MINIMUMS, ...JSON.parse(saved) }; } catch {}
  }
  return { ...DEFAULT_PLATFORM_MINIMUMS };
}
function savePlatformMinimums(mins) {
  localStorage.setItem('rac-platform-minimums-v1', JSON.stringify(mins));
}

// === Demand Plan Context ===
const DemandContext = createContext(null);
function useDemand() { return useContext(DemandContext); }

function loadDemandPlan() {
  const saved = localStorage.getItem('rac-demand-plan-v4');
  if (saved) {
    try {
      const p = JSON.parse(saved);
      if (p.vacancies && p.hireTargets && p.planDate) return p;
    } catch {}
  }
  return {
    vacancies: JSON.parse(JSON.stringify(DATA.default_vacancies)),
    hireTargets: JSON.parse(JSON.stringify(DATA.default_hire_targets_by_month)),
    planDate: DATA.demand_plan_date,
  };
}
function saveDemandPlan(dp) { localStorage.setItem('rac-demand-plan-v4', JSON.stringify(dp)); }

function DemandProvider({ children }) {
  const [demand, setDemand] = useState(() => loadDemandPlan());
  useEffect(() => { saveDemandPlan(demand); }, [demand]);
  const resetToDefaults = () => setDemand({
    vacancies: JSON.parse(JSON.stringify(DATA.default_vacancies)),
    hireTargets: JSON.parse(JSON.stringify(DATA.default_hire_targets_by_month)),
    planDate: DATA.demand_plan_date,
  });
  return <DemandContext.Provider value={{ demand, setDemand, resetToDefaults }}>{children}</DemandContext.Provider>;
}

// === Fmt ===
const fmtGBP = (n, dp=0) => {
  if (n === null || n === undefined || !isFinite(n)) return '—';
  const sign = n < 0 ? '−' : '';
  const v = Math.abs(n);
  return sign + '£' + v.toLocaleString('en-GB', { minimumFractionDigits: dp, maximumFractionDigits: dp });
};
const fmtInt = n => (n === null || n === undefined || !isFinite(n)) ? '—' : Math.round(n).toLocaleString('en-GB');
const fmtPct = (n, dp=2) => (n === null || n === undefined || !isFinite(n)) ? '—' : (n*100).toFixed(dp) + '%';

const useDebounced = (value, ms=180) => {
  const [v, setV] = useState(value);
  useEffect(() => { const t = setTimeout(() => setV(value), ms); return () => clearTimeout(t); }, [value, ms]);
  return v;
};

// === Data accessors ===
// Manual adjustments applied on top of historic data. Surfaced on the
// Assumptions tab so the team knows exactly what's being tweaked and why.
// Google was absorbing a disproportionate share of budget because its historic
// CPH looked artificially low (likely undercounting or lag in the source data).
// 20% bump is a temporary thumb-on-the-scale until the source numbers are
// reviewed.
const GOOGLE_CPH_MULTIPLIER = 1.20;
const GOOGLE_CPA_MULTIPLIER = 1.20;

function getRegionStats(platform, region, role) {
  // Uses all-time aggregated stats (Jul 2025 – Apr 2026) for maximum signal
  const raw = DATA[platform]?.[`${region}__${role}`]?.all_time;
  if (!raw) return null;
  // Apply Google cost-inflation adjustment (CPH and CPA both bumped; spend/hires
  // raw counts untouched so any downstream aggregation stays consistent).
  if (platform === 'google') {
    return {
      ...raw,
      cph: raw.cph != null ? raw.cph * GOOGLE_CPH_MULTIPLIER : raw.cph,
      cpa: raw.cpa != null ? raw.cpa * GOOGLE_CPA_MULTIPLIER : raw.cpa,
    };
  }
  return raw;
}
function confidence(hires) {
  if (hires >= 3) return 'HIGH';
  if (hires >= 2) return 'MED';
  return 'LOW';
}
function platformRoleCPH(platform, role) {
  let totalSpend = 0, totalHires = 0;
  DATA.regions_ordered.forEach(r => {
    // Read raw stats here (not via getRegionStats) because we need un-bumped
    // spend to do the division; the bump is applied to the resulting CPH below.
    const s = DATA[platform]?.[`${r}__${role}`]?.all_time;
    if (s && s.accepted > 0) { totalSpend += s.spend; totalHires += s.accepted; }
  });
  if (totalHires <= 0) return null;
  let cph = totalSpend / totalHires;
  if (platform === 'google') cph *= GOOGLE_CPH_MULTIPLIER;
  return cph;
}
// Blended role CPH across ALL platforms and regions — the true 10-month average.
// Used as the fallback CPH for any region-platform pair without HIGH-confidence data.
// This is cached because it's expensive and called per-cell.
const _blendedRoleCphCache = {};
function blendedRoleCPH(role) {
  if (_blendedRoleCphCache[role] !== undefined) return _blendedRoleCphCache[role];
  let totalSpend = 0, totalHires = 0;
  PLATFORMS.forEach(p => {
    DATA.regions_ordered.forEach(r => {
      const s = getRegionStats(p, r, role);
      if (s && s.accepted > 0) { totalSpend += s.spend; totalHires += s.accepted; }
    });
  });
  const cph = totalHires > 0 ? totalSpend / totalHires : null;
  _blendedRoleCphCache[role] = cph;
  return cph;
}

// Thresholds for how trustworthy a CPH signal needs to be before we use it.
// HISTORIC_DUD_SPEND: if this much was spent on a region×platform×role and it
// delivered zero hires, treat the pair as very expensive rather than falling
// back to the platform-role average. The data is telling us it doesn't work.
// FALLBACK_MIN_HIRES: the platform-role fallback average needs at least this
// many total hires across all regions to be considered usable. Below that, we
// return no CPH (the allocator will skip this platform×region pair).
const HISTORIC_DUD_SPEND = 2000;
const FALLBACK_MIN_HIRES = 5;

function effectiveCPH(platform, region, role) {
  // Uses the raw historic data — what it cost to hire there, per platform.
  // If a region-platform pair has meaningful data (≥£500 spend, ≥1 hire, CPH above
  // the £50 free-hire artifact floor), we use it directly. Otherwise we fall back
  // to the platform's role-wide average — but only if that fallback itself is
  // built on at least FALLBACK_MIN_HIRES. Below that threshold we say "no signal".
  //
  // CRITICAL: if a region×platform has had significant historic spend (≥£2k) and
  // zero accepted hires, we do NOT fall back to the aggregate — the data is
  // telling us this pair doesn't convert. Returning the aggregate would let the
  // allocator pick this pair as "cheap" when real-world evidence says otherwise.
  //
  // Confidence tier is reported alongside as a label. It doesn't modify the number.
  const s = getRegionStats(platform, region, role);
  if (s?.cph && s.accepted >= 1 && s.spend >= 500 && s.cph >= 50) {
    let conf;
    if (s.accepted >= 5) conf = 'HIGH';
    else if (s.accepted >= 3) conf = 'MED';
    else conf = 'LOW';
    return { cph: s.cph, conf };
  }
  // Dud detector: historic spend with zero hires on this exact pair. Refuse
  // the fallback — we have real evidence this pair underperforms.
  if (s && s.spend >= HISTORIC_DUD_SPEND && s.accepted === 0) {
    return null;
  }
  // Fallback must be grounded in enough actual hires to be trustworthy
  const platRaw = _platformRoleRawTotals(platform, role);
  if (platRaw.totalHires < FALLBACK_MIN_HIRES) return null;
  const platAvg = platformRoleCPH(platform, role);
  if (platAvg) return { cph: platAvg, conf: 'LOW' };
  return null;
}

// Helper: raw platform-role totals (before Google uplift), cached for reuse.
const _platformRoleRawCache = {};
function _platformRoleRawTotals(platform, role) {
  const key = platform + ':' + role;
  if (_platformRoleRawCache[key] !== undefined) return _platformRoleRawCache[key];
  let totalSpend = 0, totalHires = 0;
  DATA.regions_ordered.forEach(r => {
    const s = DATA[platform]?.[`${r}__${role}`]?.all_time;
    if (s && s.accepted > 0) { totalSpend += s.spend; totalHires += s.accepted; }
  });
  const result = { totalSpend, totalHires };
  _platformRoleRawCache[key] = result;
  return result;
}

function expectedHires(platform, region, role, proposedSpend) {
  if (!proposedSpend) return 0;
  // Same CPH as allocation, so spend ÷ CPH always reconciles.
  const eff = effectiveCPH(platform, region, role);
  if (!eff || !eff.cph) return 0;
  return proposedSpend / eff.cph;
}
function expectedApps(platform, region, role, proposedSpend) {
  if (!proposedSpend) return 0;
  const s = getRegionStats(platform, region, role);
  const cpa = s?.cpa > 0 ? s.cpa : (DATA.cpa_benchmarks[role === 'Combined' ? 'SMR' : role] || 40);
  return proposedSpend / cpa;
}
function sumByRegion(obj) { return Object.values(obj || {}).reduce((a, b) => a + (+b || 0), 0); }
function sumPlatformRole(plan, platform, role) { return sumByRegion(plan[platform]?.[role.toLowerCase()]); }
function sumRoleAllPlatforms(plan, role) {
  return PLATFORMS.reduce((a, p) => a + sumPlatformRole(plan, p, role), 0);
}
function predictedHiresForPlatform(regionBudget, platform, role) {
  return DATA.regions_ordered.reduce((sum, r) => sum + expectedHires(platform, r, role, regionBudget[r] || 0), 0);
}
// Uncapped total — used when we want raw theoretical hire count
function totalPredictedHiresRaw(plan, role) {
  return PLATFORMS.reduce((sum, p) => sum + predictedHiresForPlatform(plan[p]?.[role.toLowerCase()] || {}, p, role), 0);
}
// Capped at vacancies per region — the honest number, since you can't
// hire more than there are open roles even if the CPH maths says otherwise.
function totalPredictedHires(plan, role, vacancies) {
  if (!vacancies) return totalPredictedHiresRaw(plan, role);
  return DATA.regions_ordered.reduce((sum, region) => {
    const raw = PLATFORMS.reduce((s, p) =>
      s + expectedHires(p, region, role, plan[p]?.[role.toLowerCase()]?.[region] || 0), 0);
    const vac = vacancies[role]?.[region] ?? Infinity;
    return sum + Math.min(raw, vac);
  }, 0);
}
function totalExpectedApps(plan, role) {
  return PLATFORMS.reduce((sum, p) => {
    const regs = plan[p]?.[role.toLowerCase()] || {};
    return sum + DATA.regions_ordered.reduce((s, r) => s + expectedApps(p, r, role, regs[r] || 0), 0);
  }, 0);
}

// ==================================================
// TWO ALLOCATION STRATEGIES — CROSS-PLATFORM
// A: Hit target (computes needed budget from target)
// B: Max hires (uses a given budget, optimises across all pairs)
// ==================================================

function scorePairHitTarget(platform, region, role, vacancies) {
  const vac = vacancies[role][region] || 0;
  if (vac === 0) return 0;
  const eff = effectiveCPH(platform, region, role);
  if (!eff) return 0;
  const confPenalty = eff.conf === 'LOW' ? 0.4 : eff.conf === 'MED' ? 0.8 : 1.0;
  return (vac * confPenalty) / eff.cph;
}

function scorePairMaxHires(platform, region, role, vacancies) {
  const vac = vacancies[role][region] || 0;
  if (vac === 0) return 0;
  const eff = effectiveCPH(platform, region, role);
  if (!eff) return 0;
  const confPenalty = eff.conf === 'LOW' ? 0.25 : eff.conf === 'MED' ? 0.7 : 1.0;
  return (vac * confPenalty) / eff.cph;
}

function allocateAcrossPlatforms(role, totalBudget, scoreFn, vacancies) {
  if (totalBudget <= 0) {
    const zeros = {};
    PLATFORMS.forEach(p => { zeros[p] = {}; DATA.regions_ordered.forEach(r => { zeros[p][r] = 0; }); });
    return zeros;
  }
  const scores = {};
  let totalScore = 0;
  PLATFORMS.forEach(p => {
    scores[p] = {};
    DATA.regions_ordered.forEach(r => {
      const s = scoreFn(p, r, role, vacancies);
      scores[p][r] = s;
      totalScore += s;
    });
  });
  const out = {};
  PLATFORMS.forEach(p => {
    out[p] = {};
    DATA.regions_ordered.forEach(r => {
      out[p][r] = totalScore > 0 ? Math.round((scores[p][r] / totalScore) * totalBudget) : 0;
    });
  });
  return out;
}

function buildStrategyResult(role, totalBudget, scoreFn, vacancies) {
  const split = allocateAcrossPlatforms(role, totalBudget, scoreFn, vacancies);
  const platformTotals = {};
  PLATFORMS.forEach(p => { platformTotals[p] = sumByRegion(split[p]); });
  // Capped predicted hires — can't hire more than there are open roles in a region
  const predictedHires = DATA.regions_ordered.reduce((sum, region) => {
    const raw = PLATFORMS.reduce((s, p) =>
      s + expectedHires(p, region, role, split[p][region] || 0), 0);
    const vac = vacancies[role]?.[region] ?? Infinity;
    return sum + Math.min(raw, vac);
  }, 0);
  const predictedApps = PLATFORMS.reduce((s, p) =>
    s + DATA.regions_ordered.reduce((rs, r) => rs + expectedApps(p, r, role, split[p][r] || 0), 0), 0);
  return { totalBudget, platformSplit: split, platformTotals, predictedHires, predictedApps };
}


// Like applyMinimumSpendFloor, but redistributes stripped amounts to the largest existing
// allocation per platform so we don't lose budget to the sub-£100 floor. Used by Max Hires
// where hitting the requested budget matters.
function applyMinimumSpendFloorWithRedistribution(split, targetBudget) {
  const result = {};
  let stripped = 0;
  PLATFORMS.forEach(p => {
    result[p] = {};
    DATA.regions_ordered.forEach(r => {
      const v = split[p]?.[r] || 0;
      if (v < MIN_CAMPAIGN_SPEND && v > 0) {
        stripped += v;
        result[p][r] = 0;
      } else {
        result[p][r] = v;
      }
    });
  });
  // Redistribute stripped amount: dump it on the largest existing allocation across all
  // platforms/regions. Single biggest line-item absorbs the rounding difference.
  if (stripped > 0) {
    let bestP = null, bestR = null, bestVal = 0;
    PLATFORMS.forEach(p => {
      DATA.regions_ordered.forEach(r => {
        if (result[p][r] > bestVal) { bestVal = result[p][r]; bestP = p; bestR = r; }
      });
    });
    if (bestP && bestR) {
      result[bestP][bestR] += stripped;
    }
  }
  return result;
}

// Zero out any sub-£100 slivers — it's not realistic to run a campaign with £30.
// Anything below the floor collapses to £0 and the slack is lost (small amounts don't
// meaningfully shift outcomes, and keeping them creates noise in the Allocation grid).
const MIN_CAMPAIGN_SPEND = 100;
function applyMinimumSpendFloor(split) {
  const result = {};
  PLATFORMS.forEach(p => {
    result[p] = {};
    DATA.regions_ordered.forEach(r => {
      const v = split[p]?.[r] || 0;
      result[p][r] = v < MIN_CAMPAIGN_SPEND ? 0 : v;
    });
  });
  return result;
}

// Ensure each platform meets its exposure minimum by topping up its best-CPH
// region that still has vacancy capacity. Respects the cross-platform vacancy cap
// so we don't hire more than the roles that actually exist.
function applyPlatformMinimums(split, minimums, role, vacancies) {
  if (!minimums) return split;
  const result = JSON.parse(JSON.stringify(split));
  // Note: we do NOT check vacancy capacity here. Platform minimums are an exposure
  // guarantee ("Meta must get at least £X") — the client has chosen to spend that
  // amount for brand reach / diversification even if the cheapest-CPH math wouldn't
  // allocate to that platform naturally. Those £s don't need to correspond to
  // "open vacancy slots" — they're just spend commitment.
  PLATFORMS.forEach(platform => {
    const minAmount = minimums[platform] || 0;
    if (minAmount <= 0) return;
    const currentTotal = sumByRegion(result[platform]);
    if (currentTotal >= minAmount) return;
    const needed = minAmount - currentTotal;
    // Rank this platform's regions by CPH (cheapest first) — we still want the
    // exposure spend placed efficiently. Only require that the platform has
    // ANY valid CPH signal for that region (i.e. effectiveCPH returns something).
    const candidates = DATA.regions_ordered
      .map(r => {
        const vac = vacancies[role]?.[r] || 0;
        if (vac === 0) return null;  // still skip zero-vacancy regions
        const eff = effectiveCPH(platform, r, role);
        if (!eff) return null;
        return { region: r, cph: eff.cph };
      })
      .filter(Boolean)
      .sort((a, b) => a.cph - b.cph);
    if (candidates.length === 0) return;  // nowhere to place
    // Distribute the needed amount across the cheapest regions proportionally
    // so Meta doesn't dump everything into one region. Cap per region at 1x
    // regional vacancies × CPH (the "natural fill" amount).
    let remaining = needed;
    for (const c of candidates) {
      if (remaining <= 0) break;
      const vac = vacancies[role]?.[c.region] || 0;
      const naturalFill = Math.round(vac * c.cph);
      const currentOnRegion = result[platform][c.region] || 0;
      const room = Math.max(0, naturalFill - currentOnRegion);
      const add = Math.min(room > 0 ? room : naturalFill, remaining);
      if (add > 0) {
        result[platform][c.region] = currentOnRegion + add;
        remaining -= add;
      }
    }
    // If still short, spread the remainder evenly across all candidates
    if (remaining > 0) {
      const perRegion = Math.round(remaining / candidates.length);
      for (const c of candidates) {
        if (remaining <= 0) break;
        const add = Math.min(perRegion, remaining);
        result[platform][c.region] = (result[platform][c.region] || 0) + add;
        remaining -= add;
      }
    }
  });
  return result;
}

function strategyHitTarget(role, monthKey, hireTargets, vacancies, minimums) {
  // "Fill all vacancies" — for each region, give the best-available platform
  // just enough budget to fill that region's vacancies at its shrunk CPH.
  // Total budget is the sum of per-region needs.
  // CRITICAL: uses effectiveCPH (shrinkage estimator) so allocation stays consistent
  // with prediction — a region allocated at CPH £X will predict exactly budget/£X hires.
  const split = {};
  PLATFORMS.forEach(p => { split[p] = {}; });
  DATA.regions_ordered.forEach(r => {
    PLATFORMS.forEach(p => { split[p][r] = 0; });
    const vac = vacancies[role]?.[r] || 0;
    if (vac === 0) return;
    // Pick the platform with the cheapest shrunk CPH for this region-role pair.
    let bestPlat = null, bestCPH = Infinity;
    PLATFORMS.forEach(p => {
      const eff = effectiveCPH(p, r, role);
      if (eff && eff.cph < bestCPH) { bestPlat = p; bestCPH = eff.cph; }
    });
    if (bestPlat) split[bestPlat][r] = Math.round(vac * bestCPH);
  });
  // Apply exposure minimums (top up Indeed/Meta if below floor)
  const withMinimums = applyPlatformMinimums(split, minimums, role, vacancies);
  // Clean up: zero out any sub-£100 slivers (not worth running a campaign for pennies)
  const finalSplit = applyMinimumSpendFloor(withMinimums);
  const platformTotals = {};
  PLATFORMS.forEach(p => { platformTotals[p] = sumByRegion(finalSplit[p]); });
  const totalBudget = PLATFORMS.reduce((s,p) => s + platformTotals[p], 0);
  const predictedHires = DATA.regions_ordered.reduce((sum, region) => {
    const raw = PLATFORMS.reduce((s, p) =>
      s + expectedHires(p, region, role, finalSplit[p][region] || 0), 0);
    const vac = vacancies[role]?.[region] ?? Infinity;
    return sum + Math.min(raw, vac);
  }, 0);
  const predictedApps = PLATFORMS.reduce((s, p) =>
    s + DATA.regions_ordered.reduce((rs, r) => rs + expectedApps(p, r, role, finalSplit[p][r] || 0), 0), 0);
  return { totalBudget, platformSplit: finalSplit, platformTotals, predictedHires, predictedApps };
}


// Enforce platform minimums by REBALANCING (not adding). If any platform is below its
// minimum, take budget from the most over-allocated platform's least-efficient region
// and reallocate to the under-minimum platform's cheapest-CPH region. Preserves total.
function rebalanceForMinimums(split, minimums, role, vacancies) {
  if (!minimums) return split;
  const result = JSON.parse(JSON.stringify(split));
  
  const platformTotal = (p) => DATA.regions_ordered.reduce((s, r) => s + (result[p][r] || 0), 0);
  
  PLATFORMS.forEach(underPlatform => {
    const minAmount = minimums[underPlatform] || 0;
    if (minAmount <= 0) return;
    let current = platformTotal(underPlatform);
    let needed = minAmount - current;
    if (needed <= 0) return;
    
    // Find this platform's cheapest region with vacancy headroom
    const underCandidates = DATA.regions_ordered.map(r => {
      const vac = vacancies[role]?.[r] || 0;
      if (vac === 0) return null;
      const eff = effectiveCPH(underPlatform, r, role);
      if (!eff) return null;
      return { region: r, cph: eff.cph };
    }).filter(Boolean).sort((a, b) => a.cph - b.cph);
    
    if (underCandidates.length === 0) return;  // Can't place anywhere
    
    // Pull budget from other platforms' most expensive (highest CPH) allocated regions
    const donors = [];
    PLATFORMS.forEach(p => {
      if (p === underPlatform) return;
      const pTotal = platformTotal(p);
      const pMin = minimums[p] || 0;
      const available = Math.max(0, pTotal - pMin);  // Don't pull below p's own floor
      if (available <= 0) return;
      DATA.regions_ordered.forEach(r => {
        const spend = result[p][r] || 0;
        if (spend <= 0) return;
        const eff = effectiveCPH(p, r, role);
        if (!eff) return;
        donors.push({ platform: p, region: r, spend, cph: eff.cph, available });
      });
    });
    // Sort by CPH descending — pull from most expensive first
    donors.sort((a, b) => b.cph - a.cph);
    
    // Compute total capacity we can place on the under-platform across its regions
    // (allow 2x oversubscription to ensure we can hit the minimum floor even in
    // saturated scenarios). This avoids pulling from donors and losing the money.
    const capacityByRegion = underCandidates.map(c => {
      const currentOnTarget = result[underPlatform][c.region] || 0;
      const vac = vacancies[role]?.[c.region] || 0;
      const maxOnTarget = Math.round(vac * c.cph * 2);
      return { ...c, room: Math.max(0, maxOnTarget - currentOnTarget) };
    });
    const totalRoom = capacityByRegion.reduce((s, c) => s + c.room, 0);
    // If we have truly zero room anywhere, we can't hit the minimum without
    // breaking everything — bail out.
    if (totalRoom === 0) return;
    
    // Effective need is capped by total room
    needed = Math.min(needed, totalRoom);
    
    // Pull from donors (highest CPH first) and place on under-platform's cheapest regions
    let placedIdx = 0;
    for (const donor of donors) {
      if (needed <= 0) break;
      const pullable = Math.min(donor.spend, needed, donor.available);
      if (pullable <= 0) continue;
      // Try to place before pulling — find capacity
      let toPlace = pullable;
      let totalPlaced = 0;
      while (placedIdx < capacityByRegion.length && toPlace > 0) {
        const target = capacityByRegion[placedIdx];
        const place = Math.min(toPlace, target.room);
        if (place > 0) {
          result[underPlatform][target.region] += place;
          target.room -= place;
          totalPlaced += place;
          toPlace -= place;
        }
        if (target.room <= 0) placedIdx++;
      }
      // Only pull exactly what we placed
      if (totalPlaced > 0) {
        result[donor.platform][donor.region] -= totalPlaced;
        needed -= totalPlaced;
      }
    }
  });
  
  return result;
}

function strategyMaxHires(role, budget, vacancies, minimums) {
  // Blended "max hires" strategy: 70% efficiency-focused water-fill, 30% coverage-focused fill-all-vacancies.
  // This stops the strategy concentrating 100% on cheapest regions (typically Google) and abandoning
  // expensive-but-necessary regions like London.
  const MAX_HIRES_WEIGHT = 0.7;
  const COVERAGE_WEIGHT = 0.3;
  
  // Use the full budget for water-fill + coverage. Minimums are treated as floors,
  // not reservations — if a platform ends up below its floor after water-fill,
  // applyPlatformMinimums will top it up (possibly rebalancing from other platforms).
  // Previously we subtracted minimums upfront, which meant that if water-fill used
  // the whole deployable budget and minimums couldn't fit due to capacity, the
  // reserved amount was lost entirely (causing the £35k → £33k under-spend).
  const maxHiresBudget = budget * MAX_HIRES_WEIGHT;
  const coverageBudget = budget * COVERAGE_WEIGHT;
  
  // ============ Part A: Water-fill (efficiency) ============
  const waterFillCandidates = [];
  DATA.regions_ordered.forEach(r => {
    const vac = vacancies[role]?.[r] || 0;
    if (vac === 0) return;
    PLATFORMS.forEach(p => {
      const eff = effectiveCPH(p, r, role);
      if (!eff) return;
      waterFillCandidates.push({ platform: p, region: r, cph: eff.cph, conf: eff.conf, vac });
    });
  });
  const confRank = { HIGH: 0, MED: 1, LOW: 2 };
  waterFillCandidates.sort((a, b) => a.cph - b.cph || confRank[a.conf] - confRank[b.conf]);
  
  // Shared region-used tracker so neither part double-allocates a vacancy
  const regionUsed = {};
  DATA.regions_ordered.forEach(r => { regionUsed[r] = 0; });
  
  const waterSplit = {};
  PLATFORMS.forEach(p => { waterSplit[p] = {}; DATA.regions_ordered.forEach(r => { waterSplit[p][r] = 0; }); });
  
  let waterRemaining = maxHiresBudget;
  for (const c of waterFillCandidates) {
    if (waterRemaining <= 0) break;
    const availVac = Math.max(0, c.vac - regionUsed[c.region]);
    if (availVac <= 0) continue;
    const maxSpend = Math.round(availVac * c.cph);
    const actual = Math.min(maxSpend, waterRemaining);
    waterSplit[c.platform][c.region] += actual;
    regionUsed[c.region] += actual / c.cph;
    waterRemaining -= actual;
  }
  
  // ============ Part B: Coverage (proportional to remaining vacancies per region) ============
  // For each region with leftover vacancy capacity, give it coverage_budget × (its_vac_share),
  // spent on that region's cheapest available platform.
  const coverageSplit = {};
  PLATFORMS.forEach(p => { coverageSplit[p] = {}; DATA.regions_ordered.forEach(r => { coverageSplit[p][r] = 0; }); });
  
  // Compute remaining vacancies per region
  const regionRemaining = {};
  let totalRemaining = 0;
  DATA.regions_ordered.forEach(r => {
    const vac = vacancies[role]?.[r] || 0;
    const used = regionUsed[r];
    const left = Math.max(0, vac - used);
    regionRemaining[r] = left;
    totalRemaining += left;
  });
  
  if (totalRemaining > 0) {
    DATA.regions_ordered.forEach(r => {
      const rem = regionRemaining[r];
      if (rem <= 0) return;
      // This region's share of the coverage budget, proportional to its remaining vacancies
      const regionBudget = coverageBudget * (rem / totalRemaining);
      // Pick cheapest platform for this region-role
      let bestP = null, bestCph = Infinity;
      PLATFORMS.forEach(p => {
        const eff = effectiveCPH(p, r, role);
        if (eff && eff.cph < bestCph) { bestP = p; bestCph = eff.cph; }
      });
      if (!bestP) return;
      // Cap spend at what's needed to fill the remaining vacancies
      const maxSpendForRegion = Math.round(rem * bestCph);
      const actualSpend = Math.min(regionBudget, maxSpendForRegion);
      coverageSplit[bestP][r] += Math.round(actualSpend);
      regionUsed[r] += actualSpend / bestCph;
    });
  }
  
  // ============ Combine ============
  const split = {};
  PLATFORMS.forEach(p => {
    split[p] = {};
    DATA.regions_ordered.forEach(r => {
      split[p][r] = (waterSplit[p][r] || 0) + (coverageSplit[p][r] || 0);
    });
  });
  
  // ============ Budget-match pass ============
  // If the combined allocation doesn't use the full budget (common when vacancy caps
  // are hit early or when the £100 floor strips slivers), redistribute the remainder
  // to the cheapest region-platform pairs that still have headroom.
  // Headroom = vacancy capacity not yet used by this pair.
  const currentTotal = PLATFORMS.reduce((s, p) =>
    s + DATA.regions_ordered.reduce((ss, r) => ss + (split[p][r] || 0), 0), 0);
  let shortfall = budget - currentTotal;
  if (shortfall > 100) {
    // Build a list of candidates sorted by CPH (cheapest first) with their remaining headroom
    const topUpCandidates = waterFillCandidates.map(c => {
      const already = split[c.platform][c.region] || 0;
      const maxSpend = Math.round(c.vac * c.cph);
      const headroom = Math.max(0, maxSpend - already);
      return { ...c, already, headroom };
    }).filter(c => c.headroom > 0)
      .sort((a, b) => a.cph - b.cph || confRank[a.conf] - confRank[b.conf]);
    
    // First pass: fill each candidate up to its vacancy cap, cheapest first
    for (const c of topUpCandidates) {
      if (shortfall <= 0) break;
      const addition = Math.min(c.headroom, shortfall);
      split[c.platform][c.region] = (split[c.platform][c.region] || 0) + addition;
      shortfall -= addition;
    }
    
    // Second pass: if ALL regions are at vacancy cap but budget remains,
    // soften the vacancy cap — scale proportionally into the cheapest regions.
    // (Rationale: you said "spend £35k" so we spend £35k; over-saturation just
    // diminishes returns but doesn't invalidate the commitment.)
    if (shortfall > 100) {
      // Find regions where the cheapest platform exists, sort by CPH ascending
      const softCandidates = DATA.regions_ordered.map(r => {
        let bestP = null, bestCph = Infinity;
        PLATFORMS.forEach(p => {
          const eff = effectiveCPH(p, r, role);
          if (eff && eff.cph < bestCph) { bestP = p; bestCph = eff.cph; }
        });
        return bestP ? { platform: bestP, region: r, cph: bestCph } : null;
      }).filter(Boolean).sort((a, b) => a.cph - b.cph);
      
      // Distribute remaining proportionally (inverse-weighted by CPH so cheaper gets more)
      const totalInvCph = softCandidates.reduce((s, c) => s + 1 / c.cph, 0);
      softCandidates.forEach(c => {
        const share = (1 / c.cph) / totalInvCph;
        split[c.platform][c.region] = (split[c.platform][c.region] || 0) + Math.round(shortfall * share);
      });
      shortfall = 0;
    }
  }
  
  // Enforce platform minimums by REBALANCING (not adding). Total spend stays at budget.
  const withMinimums = rebalanceForMinimums(split, minimums, role, vacancies);
  // Clean up: zero out any sub-£100 slivers and redistribute stripped amount to the
  // largest existing allocation so we don't lose budget to the floor.
  const finalSplit = applyMinimumSpendFloorWithRedistribution(withMinimums, budget);
  const platformTotals = {};
  PLATFORMS.forEach(p => { platformTotals[p] = sumByRegion(finalSplit[p]); });
  const predictedHires = DATA.regions_ordered.reduce((sum, region) => {
    const raw = PLATFORMS.reduce((s, p) =>
      s + expectedHires(p, region, role, finalSplit[p][region] || 0), 0);
    const vac = vacancies[role]?.[region] ?? Infinity;
    return sum + Math.min(raw, vac);
  }, 0);
  const predictedApps = PLATFORMS.reduce((s, p) =>
    s + DATA.regions_ordered.reduce((rs, r) => rs + expectedApps(p, r, role, finalSplit[p][r] || 0), 0), 0);
  const finalBudget = PLATFORMS.reduce((s,p) => s + platformTotals[p], 0);
  return { totalBudget: finalBudget, platformSplit: finalSplit, platformTotals, predictedHires, predictedApps };
}

function getMonthBriefBudget(monthKey, role) { return DATA.spend_proposal_by_month[monthKey]?.[role] || 0; }

function buildDefaultPlan(monthKey, vacancies, hireTargets, minimums) {
  const plan = {};
  PLATFORMS.forEach(p => { plan[p] = { smr: {}, patrol: {} }; });
  PLATFORMS.forEach(p => ['smr','patrol'].forEach(roleK => {
    DATA.regions_ordered.forEach(r => { plan[p][roleK][r] = 0; });
  }));
  ['SMR','Patrol'].forEach(role => {
    const brief = getMonthBriefBudget(monthKey, role);
    const res = strategyHitTarget(role, monthKey, hireTargets, vacancies, minimums || DEFAULT_PLATFORM_MINIMUMS);
    PLATFORMS.forEach(p => {
      plan[p][role.toLowerCase()] = res.platformSplit[p];
    });
  });
  return plan;
}

// Per-role custom "Max Hires budget" — persisted per month+role in localStorage
function loadMaxBudget(monthKey, role) {
  const saved = localStorage.getItem(`rac-max-budget-${monthKey}-${role}`);
  if (saved) {
    const n = parseInt(saved);
    if (!isNaN(n) && n >= 0) return n;
  }
  return getMonthBriefBudget(monthKey, role);
}
function saveMaxBudget(monthKey, role, v) {
  localStorage.setItem(`rac-max-budget-${monthKey}-${role}`, String(v));
}

// Indeed Premium campaigns: £44/day per campaign, cost per role = campaigns × days × £44.
// Default is 3 campaigns per role; 0 means "no Premium" (nothing held back for Premium).
const INDEED_PREMIUM_RATE_PER_DAY = 44;
const INDEED_PREMIUM_DEFAULT = 3;
const INDEED_PREMIUM_OPTIONS = [0, 3, 4, 5];
// Non-standard (unallocated) hold-back: 10% of role budget, not broken down
// by platform or region — reserved for ad-hoc / reactive campaigns.
const NONSTANDARD_HOLDBACK_RATE = 0.10;

function loadPremiumCampaigns(monthKey, role) {
  const saved = localStorage.getItem(`rac-premium-${monthKey}-${role}`);
  if (saved) {
    const n = parseInt(saved);
    if (!isNaN(n) && INDEED_PREMIUM_OPTIONS.includes(n)) return n;
  }
  return INDEED_PREMIUM_DEFAULT;
}
function savePremiumCampaigns(monthKey, role, n) {
  localStorage.setItem(`rac-premium-${monthKey}-${role}`, String(n));
}
function indeedPremiumCost(monthKey, campaigns) {
  const days = DATA.days_in_month?.[monthKey] || 30;
  return Math.round(campaigns * days * INDEED_PREMIUM_RATE_PER_DAY);
}
function computeHoldbacks(role, budget, monthKey, premiumCampaignsOverride) {
  // Breaks a role's total budget into: Premium (Indeed Premium campaigns),
  // Non-Standard (flat 10%), and Deployable (what strategies allocate across
  // platforms and regions). If campaign count isn't supplied, read from storage.
  const campaigns = typeof premiumCampaignsOverride === 'number'
    ? premiumCampaignsOverride
    : loadPremiumCampaigns(monthKey, role);
  const premium = indeedPremiumCost(monthKey, campaigns);
  const nonStandard = Math.round(budget * NONSTANDARD_HOLDBACK_RATE);
  const deployable = Math.max(0, budget - premium - nonStandard);
  return { premium, premiumCampaigns: campaigns, nonStandard, deployable, totalBudget: budget };
}

// ---- Applied hold-back snapshot ----
// When Max Hires is applied, we snapshot {budget, premiumCampaigns, premium, nonStandard}
// so the Dashboard + PDF reflect what was actually committed to the plan, not a live
// recompute. Changing the Premium count without re-applying shouldn't silently change
// the Dashboard total — the user has to click Apply to commit it.
function loadAppliedHoldbacks(monthKey, role) {
  try {
    const saved = localStorage.getItem(`rac-applied-holdbacks-${monthKey}-${role}`);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return null;
}
function saveAppliedHoldbacks(monthKey, role, snapshot) {
  if (snapshot === null) {
    localStorage.removeItem(`rac-applied-holdbacks-${monthKey}-${role}`);
    return;
  }
  localStorage.setItem(`rac-applied-holdbacks-${monthKey}-${role}`, JSON.stringify(snapshot));
}
// Returns the hold-backs that match what's currently in the applied plan.
// If nothing's been applied yet, falls back to the live (pending) settings.
function getEffectiveHoldbacks(role, monthKey) {
  const applied = loadAppliedHoldbacks(monthKey, role);
  if (applied) {
    return {
      premium: applied.premium,
      premiumCampaigns: applied.premiumCampaigns,
      nonStandard: applied.nonStandard,
      deployable: Math.max(0, applied.budget - applied.premium - applied.nonStandard),
      totalBudget: applied.budget,
    };
  }
  // No applied snapshot — compute live from current settings
  return computeHoldbacks(role, loadMaxBudget(monthKey, role), monthKey);
}

// Per-role live data summary
function pdfGetRoleData(role, plan, monthKey) {
  // Read live demand plan from localStorage (same key the app writes to).
  // Falls back to the baked-in defaults only when nothing's been saved yet.
  let targets = DATA.default_hire_targets_by_month[monthKey] || { SMR: 0, Patrol: 0 };
  let vacancies = DATA.default_vacancies || { SMR: {}, Patrol: {} };
  try {
    const stored = localStorage.getItem('rac-demand-plan-v4');
    if (stored) {
      const d = JSON.parse(stored);
      if (d && d.hireTargets && d.hireTargets[monthKey]) targets = d.hireTargets[monthKey];
      if (d && d.vacancies) vacancies = d.vacancies;
    }
  } catch(e) {}
  // `platformSpend` = what's actually allocated into plan[platform][role][region]
  // `holdbacks` = the hold-backs that were committed AT THE TIME Max Hires was
  // applied (read from snapshot). If no snapshot exists, falls back to live
  // settings. This guarantees the PDF matches the applied tool state — if the
  // user changes Premium without re-applying, the PDF still shows the old
  // committed numbers.
  const platformSpend = PLATFORMS.reduce((s, p) => s + sumPlatformRole(plan, p, role), 0);
  const holdbacks = getEffectiveHoldbacks(role, monthKey);
  const budget = platformSpend + holdbacks.premium + holdbacks.nonStandard;
  const predicted = totalPredictedHires(plan, role, vacancies);
  const predictedApps = PLATFORMS.reduce((s, p) => s + DATA.regions_ordered.reduce((rs, r) => rs + expectedApps(p, r, role, (plan[p] && plan[p][role.toLowerCase()] && plan[p][role.toLowerCase()][r]) || 0), 0), 0);
  const target = targets[role] || 0;
  const totalVac = Object.values(vacancies[role] || {}).reduce((a, b) => a + (+b || 0), 0);
  const briefed = getMonthBriefBudget(monthKey, role);
  return { budget, platformSpend, holdbacks, predicted, predictedApps, target, totalVac, briefed, vacancies, targets };
}

function pdfFillAllBudget(role, monthKey, minimums) {
  let vacancies = DATA.default_vacancies || { SMR: {}, Patrol: {} };
  let targets = DATA.default_hire_targets_by_month[monthKey] || {};
  try {
    const stored = localStorage.getItem('rac-demand-plan-v4');
    if (stored) {
      const d = JSON.parse(stored);
      if (d && d.vacancies) vacancies = d.vacancies;
      if (d && d.hireTargets && d.hireTargets[monthKey]) targets = d.hireTargets[monthKey];
    }
  } catch(e) {}
  const a = strategyHitTarget(role, monthKey, targets, vacancies, minimums || DEFAULT_PLATFORM_MINIMUMS);
  return a.totalBudget;
}

    // Strategy summary table
    let syy = hbY + hbH + 8;
    syy = sectionTitle('Strategy at a glance', syy, 'B = max hires (recommended plan) \u00b7 A = theoretical reference only');
    const stratCols = [52, 62, 42, 42, 42];

    syy += 7.5;

    const stratRows = [
      { role: 'SMR', strategy: 'B', scenario: 'Max hires (recommended)', budget: smr.budget, hires: smr.predicted, target: smr.target, isReference: false },

      { role: 'Patrol', strategy: 'B', scenario: 'Max hires (recommended)', budget: patrol.budget, hires: patrol.predicted, target: patrol.target, isReference: false },
      { role: 'Patrol', strategy: 'A', scenario: 'Theoretical fill cost (reference)', budget: patrolFillAll, hires: null, target: patrol.target, isReference: true },

    stratRows.forEach((r, i) => {
      if (i % 2 === 1) {

      pdf.text(r.role === 'SMR' ? 'Mobile Vehicle Tech' : 'Roadside Tech', stratX[0] + 2, syy + 5.5);

      // Reference rows use muted ink; executable rows use full ink
      if (r.isReference) {

    syy += 4;

    // Context block

    pdf.setFontSize(10);
    pdf.text('How this plan was built', margin + 5, syy + 7);
    pdf.setFont('helvetica', 'normal');
    pdf.setFontSize(9);
    pdf.text('Every figure is based on 10 months of actual RAC campaign performance (Jul 2025 – Apr 2026) across all four platforms.', margin + 5, syy + 14);

    pdf.text('Max Hires reserves 30% of budget for coverage across regions, so spend doesn’t concentrate in only the 2–3 cheapest regions.', margin + 5, syy + 26);

    // =============== PER-ROLE DEEP DIVE ===============
    const drawRoleDeepDive = (role, data, fillAllBudget) => {
      const roleLabel = role === 'SMR' ? 'Mobile Vehicle Tech (SMR)' : 'Roadside Tech (Patrol, incl. SuperFlex)';
      const roleColor = role === 'SMR' ? B.RAC_ORANGE : B.EM_BLUE;
      const roleColorLt = role === 'SMR' ? B.RAC_ORANGE_LT : B.EM_BLUE_LT;
      const roleKey = role.toLowerCase();

      pdf.addPage();
      drawHeader(roleLabel);

      // Role banner
      let y = 20;
      pdf.setFillColor(roleColorLt[0], roleColorLt[1], roleColorLt[2]);
      pdf.rect(margin, y, contentW, 22, 'F');
      pdf.setFillColor(roleColor[0], roleColor[1], roleColor[2]);
      pdf.rect(margin, y, 3, 22, 'F');
      pdf.setFont('helvetica', 'bold');

      pdf.setFont('helvetica', 'normal');
      pdf.setFontSize(9);
      pdf.setTextColor(B.INK_55[0], B.INK_55[1], B.INK_55[2]);
      pdf.text('Applied allocation for ' + monthLabel, margin + 7, y + 15);

      // Right-side KPI strip inside banner
      const miniKpis = [
        { label: 'BUDGET', value: fmtGBP(data.budget) },
        { label: 'PREDICTED', value: data.predicted.toFixed(1) + ' hires' },
        { label: 'VS TARGET', value: (data.predicted >= data.target - 0.5 ? '+' : '') + (data.predicted - data.target).toFixed(1) },
        { label: 'VACANCIES', value: String(data.totalVac) },
      ];
      const miniW = 32;
      miniKpis.forEach((k, i) => {
        const x = pageW - margin - (4 - i) * miniW;
        pdf.setFont('helvetica', 'normal');
        pdf.setFontSize(7);
        pdf.setTextColor(B.INK_55[0], B.INK_55[1], B.INK_55[2]);
        pdf.text(k.label, x, y + 10);
        pdf.setFont('helvetica', 'bold');
        pdf.setFontSize(11);
        pdf.setTextColor(B.RAC_NAVY[0], B.RAC_NAVY[1], B.RAC_NAVY[2]);
        pdf.text(k.value, x, y + 17);
      });
      y += 26;

      // Strategy comparison pills (condensed)
      pdf.setFont('helvetica', 'bold');
      pdf.setFontSize(9.5);
      pdf.setTextColor(B.RAC_NAVY[0], B.RAC_NAVY[1], B.RAC_NAVY[2]);
      pdf.text('Current plan delivers ' + data.predicted.toFixed(1) + ' / ' + data.target + ' target at ' + fmtGBP(data.budget) + ' total.', margin, y + 4);
      pdf.setFont('helvetica', 'normal');
      pdf.setTextColor(B.INK_55[0], B.INK_55[1], B.INK_55[2]);
      pdf.setFontSize(9);
      const avg = data.predicted > 0 ? ' Avg ' + fmtGBP(data.platformSpend / data.predicted) + ' per hire (regional campaigns only).' : '';
      pdf.text('For reference: the theoretical cost to cover all ' + data.totalVac + ' vacancies at historic best-CPH is ' + fmtGBP(fillAllBudget) + ' (lower bound, see caveats).' + avg, margin, y + 9);
      y += 14;

      // ----- Budget composition + Indeed Premium scenarios -----
      // Use the applied snapshot's budget so the scenarios table shows what-ifs
      // relative to what was committed, not a hypothetical current setting.
      const applied = loadAppliedHoldbacks(monthKey, role);
      const scenarioBase = applied ? applied.budget : loadMaxBudget(monthKey, role);
      const scenarios = INDEED_PREMIUM_OPTIONS.map(n => {
        const hb = computeHoldbacks(role, scenarioBase, monthKey, n);
        const isActive = n === data.holdbacks.premiumCampaigns;
        return { n, hb, isActive };
      });
      // Section header
      pdf.setFillColor(roleColor[0], roleColor[1], roleColor[2]);
      pdf.rect(margin, y, 2.5, 6, 'F');
      pdf.setFont('helvetica', 'bold');
      pdf.setFontSize(10);
      pdf.setTextColor(B.RAC_NAVY[0], B.RAC_NAVY[1], B.RAC_NAVY[2]);
      pdf.text('Budget composition — Indeed Premium scenarios', margin + 5, y + 4.6);
      pdf.setFont('helvetica', 'normal');
      pdf.setFontSize(8);
      pdf.setTextColor(B.INK_55[0], B.INK_55[1], B.INK_55[2]);
      pdf.text('Active scenario marked •', pageW - margin, y + 4.6, { align: 'right' });
      y += 8;

      // Table columns: Scenario, Premium £, Non-Std £, Platform £, Total £
      const sColW = [36, 36, 36, 44, 42, 36];
      const sColX = [margin];
      for (let i = 0; i < sColW.length - 1; i++) sColX.push(sColX[i] + sColW[i]);
      pdf.setFillColor(B.PAPER_DK[0], B.PAPER_DK[1], B.PAPER_DK[2]);
      pdf.rect(margin, y, contentW, 6.5, 'F');
      pdf.setFont('helvetica', 'bold');
      pdf.setFontSize(7.5);
      pdf.setTextColor(B.INK_55[0], B.INK_55[1], B.INK_55[2]);
      ['Scenario', 'Indeed Premium', 'Awareness & Cons.', 'Regional campaigns', 'Total committed', 'Days × rate'].forEach((h, i) => {
        pdf.text(h.toUpperCase(), sColX[i] + 2, y + 4.3);
      });
      y += 6.5;

      const days = DATA.days_in_month?.[monthKey] || 30;
      scenarios.forEach((sc, i) => {
        if (sc.isActive) {
          pdf.setFillColor(255, 244, 230);
          pdf.rect(margin, y, contentW, 6.2, 'F');

          pdf.setFillColor(250, 251, 252);
          pdf.rect(margin, y, contentW, 6.2, 'F');
        }
        // Active dot
        if (sc.isActive) {
          pdf.setFillColor(roleColor[0], roleColor[1], roleColor[2]);
          pdf.circle(margin + 3, y + 3.1, 1.2, 'F');

        pdf.setFontSize(8.5);
        pdf.setTextColor(B.INK[0], B.INK[1], B.INK[2]);
        pdf.text(sc.n === 0 ? 'No Premium' : sc.n + ' campaigns', sColX[0] + (sc.isActive ? 6 : 2), y + 4.2);

        pdf.text(fmtGBP(sc.hb.totalBudget), sColX[4] + 2, y + 4.2);

        pdf.setTextColor(B.INK[0], B.INK[1], B.INK[2]);
        y += 6.2;
      });
      y += 6;

      // Per-platform allocation tables
      // For each platform: header row with platform total, then per-region rows
      PLATFORMS.forEach(p => {
        const platformTotal = sumPlatformRole(plan, p, role);
        const regionsData = DATA.regions_ordered.map(r => {
          const spend = (plan[p] && plan[p][roleKey] && plan[p][roleKey][r]) || 0;
          const eff = effectiveCPH(p, r, role);
          const pred = expectedHires(p, r, role, spend);
          const apps = expectedApps(p, r, role, spend);
          const vac = (data.vacancies[role] && data.vacancies[role][r]) || 0;
          return { region: r, spend, cph: eff ? eff.cph : null, conf: eff ? eff.conf : null, pred, apps, vac };

        const hasAny = regionsData.some(r => r.spend > 0) || platformTotal > 0;

        // Platform header bar

        const platShare = data.budget > 0 ? ((platformTotal / data.budget) * 100).toFixed(1) : '0.0';
        pdf.setFont('helvetica', 'normal');
        pdf.setFontSize(9);
        pdf.text(fmtGBP(platformTotal) + ' · ' + platShare + '% · ' + platPred.toFixed(1) + ' hires · ' + Math.round(platApps) + ' apps', pageW - margin - 3, y + 5.5, { align: 'right' });
        y += 8;

        if (!hasAny) {
          pdf.setFillColor(B.PAPER[0], B.PAPER[1], B.PAPER[2]);
          pdf.rect(margin, y, contentW, 9, 'F');
          pdf.setFont('helvetica', 'italic');
          pdf.setFontSize(9);
          pdf.setTextColor(B.INK_55[0], B.INK_55[1], B.INK_55[2]);
          pdf.text('No budget allocated to ' + PLATFORM_LABELS[p] + ' for this role.', margin + 3, y + 6);
          y += 12;
          return;
        }

        // Column headers
        const cols = [
          { k: 'region', w: 45, label: 'Region', align: 'left' },
          { k: 'spend', w: 26, label: 'Budget', align: 'left' },
          { k: 'cph', w: 22, label: 'CPH used', align: 'left' },
          { k: 'conf', w: 22, label: 'Confidence', align: 'left' },
          { k: 'pred', w: 22, label: 'Pred. hires', align: 'left' },

        pdf.setFontSize(7.5);
        pdf.setTextColor(B.INK_55[0], B.INK_55[1], B.INK_55[2]);
        cols.forEach((c, i) => { pdf.text(c.label.toUpperCase(), colX[i] + 2, y + 4); });
        y += 6;

        // Region rows (only regions that have spend OR have vacancies)
        const filteredRegions = regionsData.filter(rd => rd.spend > 0 || rd.vac > 0);
        filteredRegions.forEach((rd, i) => {
          if (y + 6 > pageH - 12) {
            pdf.addPage();
            drawHeader(roleLabel);
            y = 20;
            // redraw platform header and column headers for continuity
            pdf.setFillColor(B.RAC_NAVY[0], B.RAC_NAVY[1], B.RAC_NAVY[2]);
            pdf.rect(margin, y, contentW, 8, 'F');
            pdf.setTextColor(255, 255, 255);
            pdf.setFont('helvetica', 'bold');
            pdf.setFontSize(10);
            pdf.text(PLATFORM_LABELS[p] + ' (continued)', margin + 3, y + 5.5);
            y += 8;
            pdf.setFillColor(B.PAPER_DK[0], B.PAPER_DK[1], B.PAPER_DK[2]);
            pdf.rect(margin, y, contentW, 6, 'F');
            pdf.setFont('helvetica', 'bold');
            pdf.setFontSize(7.5);
            pdf.setTextColor(B.INK_55[0], B.INK_55[1], B.INK_55[2]);
            cols.forEach((c, ci) => { pdf.text(c.label.toUpperCase(), colX[ci] + 2, y + 4); });
            y += 6;
          }
          if (i % 2 === 1) {
            pdf.setFillColor(250, 251, 252);
            pdf.rect(margin, y, contentW, 5.8, 'F');
          }
          const unfunded = rd.vac > 0 && rd.spend === 0;
          pdf.setFont('helvetica', unfunded ? 'italic' : 'normal');
          pdf.setFontSize(8.5);
          pdf.setTextColor(unfunded ? B.BAD[0] : B.INK[0], unfunded ? B.BAD[1] : B.INK[1], unfunded ? B.BAD[2] : B.INK[2]);
          pdf.text(rd.region, colX[0] + 2, y + 4);
          pdf.setFont('helvetica', rd.spend > 0 ? 'bold' : 'normal');
          pdf.setTextColor(rd.spend === 0 ? B.INK_35[0] : B.INK[0], rd.spend === 0 ? B.INK_35[1] : B.INK[1], rd.spend === 0 ? B.INK_35[2] : B.INK[2]);
          pdf.text(rd.spend > 0 ? fmtGBP(rd.spend) : '—', colX[1] + 2, y + 4);
          pdf.setFont('helvetica', 'normal');
          pdf.setTextColor(B.INK[0], B.INK[1], B.INK[2]);
          pdf.text(rd.cph ? fmtGBP(rd.cph) : '—', colX[2] + 2, y + 4);
          if (rd.conf) {
            const confCol = rd.conf === 'HIGH' ? B.GOOD : rd.conf === 'MED' ? B.WARN : B.INK_35;

            pdf.setFillColor(confBg[0], confBg[1], confBg[2]);
            pdf.roundedRect(colX[3] + 1, y + 1, 12, 4, 0.8, 0.8, 'F');
            pdf.setFont('helvetica', 'bold');
            pdf.setFontSize(6.5);
            pdf.setTextColor(confCol[0], confCol[1], confCol[2]);
            pdf.text(rd.conf, colX[3] + 7, y + 4, { align: 'center' });
          } else {
            pdf.setFont('helvetica', 'normal');
            pdf.setFontSize(8.5);
            pdf.setTextColor(B.INK_35[0], B.INK_35[1], B.INK_35[2]);
            pdf.text('—', colX[3] + 2, y + 4);
          }
          pdf.setFont('helvetica', 'normal');
          pdf.setFontSize(8.5);
          pdf.setTextColor(B.INK[0], B.INK[1], B.INK[2]);
          pdf.text(rd.pred > 0 ? rd.pred.toFixed(1) : '—', colX[4] + 2, y + 4);
          pdf.text(rd.apps > 0 ? String(Math.round(rd.apps)) : '—', colX[5] + 2, y + 4);
          pdf.text(String(rd.vac), colX[6] + 2, y + 4);
          const sh = platformTotal > 0 ? ((rd.spend / platformTotal) * 100).toFixed(0) + '%' : '—';
          pdf.setTextColor(rd.spend === 0 ? B.INK_35[0] : B.INK_55[0], rd.spend === 0 ? B.INK_35[1] : B.INK_55[1], rd.spend === 0 ? B.INK_35[2] : B.INK_55[2]);
          pdf.text(sh, colX[7] + 2, y + 4);
          y += 5.8;
        });

        y += 4;  // gap between platforms
      });
    };

    drawRoleDeepDive('SMR', smr, smrFillAll);
    drawRoleDeepDive('Patrol', patrol, patrolFillAll);

    // =============== SUMMARY PAGE — per-role platform & region breakdowns ===============
    pdf.addPage();
    drawHeader('Summary — per role');

    pdf.setFont('helvetica', 'bold');
    pdf.setFontSize(20);
    pdf.setTextColor(B.RAC_NAVY[0], B.RAC_NAVY[1], B.RAC_NAVY[2]);
    pdf.text('Summary — SMR & Patrol', margin, 22);

      { term: 'Platform minimums', def: 'Exposure floors for brand-diversification (e.g. Meta \u00a31.5k, Indeed \u00a33k). Applied on top of the cheapest-CPH allocation; these are commitment spend, not hire-optimised.' },

// ---------- Popover ----------
function Popover({ popoverKey, title, body, trigger }) {
  const [open, setOpen] = useState(false);
  const [triggerRect, setTriggerRect] = useState(null);
  const popoverRef = useRef(null);
  const [pos, setPos] = useState({ left: 0, top: 0, ready: false });
  
  // After the popover renders, measure its actual size and correct positioning
  React.useLayoutEffect(() => {
    if (!open || !triggerRect || !popoverRef.current) return;
    const el = popoverRef.current;
    const pw = el.offsetWidth;
    const ph = el.offsetHeight;
    const M = 12;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    
    // Horizontal: prefer aligning to trigger's left edge, but clamp to viewport
    let left = triggerRect.left;
    if (left + pw + M > vw) left = vw - pw - M;
    if (left < M) left = M;
    
    // Vertical: prefer below trigger, but flip above if it would overflow
    let top = triggerRect.bottom + 8;
    if (top + ph + M > vh) {
      // Try flipping above
      const aboveTop = triggerRect.top - ph - 8;
      if (aboveTop >= M) {
        top = aboveTop;
      } else {
        // Neither below nor above fits — clamp to viewport
        top = Math.max(M, vh - ph - M);
      }
    }
    if (top < M) top = M;
    
    setPos({ left, top, ready: true });
  }, [open, triggerRect]);
  
  const handleClick = (e) => {
    e.stopPropagation();
    e.preventDefault();
    const rect = e.currentTarget.getBoundingClientRect();
    setTriggerRect({ left: rect.left, right: rect.right, top: rect.top, bottom: rect.bottom });
    setPos({ left: 0, top: 0, ready: false });
    setOpen(true);
  };
  
  // Close on scroll/resize to avoid stale positioning
  useEffect(() => {
    if (!open) return;
    const close = () => setOpen(false);
    window.addEventListener('scroll', close, { passive: true, capture: true });
    window.addEventListener('resize', close);
    return () => {
      window.removeEventListener('scroll', close, { capture: true });
      window.removeEventListener('resize', close);
    };
  }, [open]);
  
  const info = popoverKey ? POPOVER_TEXTS[popoverKey] : { title, body };
  if (!info || (!info.title && !info.body)) return trigger;
  
  return (
    <>
      <span onClick={handleClick} style={{display:'inline-flex', alignItems:'center', cursor:'pointer'}}>{trigger}</span>
      {open && (
        <>
          <div className="popover-backdrop" onClick={() => setOpen(false)} />
          <div
            ref={popoverRef}
            className="popover"
            style={{
              left: pos.left,
              top: pos.top,
              visibility: pos.ready ? 'visible' : 'hidden',
            }}
          >
            <button className="popover-close" onClick={() => setOpen(false)}>×</button>
            <h5>{info.title}</h5>
            <div style={{margin:0, color:'var(--ink-70)'}}>{info.body}</div>
          </div>
        </>
      )}
    </>
  );
}

// Clickable confidence pill with contextual tooltip (includes actual numbers)
function ConfPill({ conf, platform, region, role }) {
  let title, body;
  if (platform && region && role) {
    const s = getRegionStats(platform, region, role);
    const spend = s?.spend || 0;
    const hires = s?.accepted || 0;
    const completes = s?.completes || 0;
    const cph = s?.cph;
    title = `${conf} confidence — ${PLATFORM_LABELS[platform]} ${region} · ${role}`;
    body = (
      <>
        <div style={{marginBottom:8, fontSize:12.5}}>
          <strong>Historic actuals (Jul 2025 – Apr 2026):</strong>
        </div>
        <table className="mini-stat-table">
          <tbody>
            <tr><td>Spend</td><td>{fmtGBP(spend)}</td></tr>
            <tr><td>Apply Completes</td><td>{fmtInt(completes)}</td></tr>
            <tr><td>Hires (Application Accepted)</td><td>{hires}</td></tr>
            <tr><td>CPH</td><td>{cph ? fmtGBP(cph) : '—'}</td></tr>
          </tbody>
        </table>
        <div style={{marginTop:10, fontSize:12.5, lineHeight:1.5}}>
          {conf === 'HIGH' && <>5+ hires over Jul 2025 – Apr 2026 — statistically stable CPH. Safe to allocate budget against.</>}
          {conf === 'MED' && <>2–4 hires over Jul 2025 – Apr 2026 is directional. One extra hire would move the CPH noticeably, so treat as ballpark not gospel.</>}
          {conf === 'LOW' && hires === 1 && <>Just 1 hire across Jul 2025 – Apr 2026. The £{Math.round(cph||0).toLocaleString()} CPH is that single hire's cost — if the next attempt costs twice as much or half as much, the number flips. Strategies substitute the platform average to avoid decisions dominated by this one data point.</>}
          {conf === 'LOW' && hires === 0 && <>Zero hires in the historic dataset. {spend > 5000 ? <>With <span className="mono">{fmtGBP(spend)}</span> spent and nothing to show, either there's an issue with targeting or this channel genuinely isn't converting for this slot.</> : <>Not enough spend yet to draw any conclusion.</>}</>}
        </div>
      </>
    );
  } else {
    // No context → generic tooltip
    const key = 'conf-' + conf.toLowerCase();
    return <Popover popoverKey={key} trigger={<span className={"conf-pill conf-" + conf.toLowerCase() + " clickable"}>{conf}</span>} />;
  }
  return (
    <Popover title={title} body={body} trigger={<span className={"conf-pill conf-" + conf.toLowerCase() + " clickable"}>{conf}</span>} />
  );
}

function MonthPicker({ monthKey, setMonthKey }) {
  const [open, setOpen] = useState(false);

  useEffect(() => {
    if (!open) return;
    const onClick = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    const onEsc = (e) => { if (e.key === 'Escape') setOpen(false); };
    document.addEventListener('mousedown', onClick);
    document.addEventListener('keydown', onEsc);
    return () => { document.removeEventListener('mousedown', onClick); document.removeEventListener('keydown', onEsc); };
  }, [open]);
  return (
    <div className="month-picker-wrap" ref={wrapRef}>
      <button className="month-picker-btn" onClick={() => setOpen(!open)}>

// ---------- Insights / recommendations panel ----------
function InsightsPanel({ plan, monthKey, setTab, setRoleView }) {
  const { demand } = useDemand();
  const { vacancies, hireTargets } = demand;
  const insights = [];
  
  // --- Platform efficiency ranking ---
  const platformEff = PLATFORMS.map(p => {
    const ov = DATA[p].OVERALL?.all_time;
    return { platform: p, spend: ov?.spend || 0, hires: ov?.accepted || 0, cph: (ov?.accepted > 0 ? (ov.spend / ov.accepted) : null) };
  }).filter(x => x.cph != null).sort((a, b) => a.cph - b.cph);
  if (platformEff.length >= 2) {
    const best = platformEff[0];
    const worst = platformEff[platformEff.length - 1];
    const ratio = worst.cph / best.cph;
    if (ratio > 2) {
      insights.push({
        type: 'warn', icon: '!',
        text: <>{PLATFORM_LABELS[worst.platform]} CPH is <strong>{ratio.toFixed(1)}× higher</strong> than {PLATFORM_LABELS[best.platform]} across the full historic dataset — <span className="mono">{fmtGBP(worst.cph)}</span> vs <span className="mono">{fmtGBP(best.cph)}</span>. Strategy B will down-weight {PLATFORM_LABELS[worst.platform]} automatically; worth questioning whether it deserves much share at all.</>
      });
    }
    // Platform ranking summary
    insights.push({
      type: 'info', icon: 'i',
      text: <>Platform efficiency ranking (Jul 25 – Apr 26): {platformEff.map((x, i) => (
        <React.Fragment key={x.platform}>
          {i > 0 && ' · '}
          <strong>{PLATFORM_LABELS[x.platform]}</strong> <span className="mono">{fmtGBP(x.cph)}</span> ({x.hires} hires)
        </React.Fragment>
      ))}</>
    });
  }
  
  // --- Dead-weight platform-region combos (high spend, zero hires) ---
  const deadWeight = [];
  PLATFORMS.forEach(p => {
    DATA.regions_ordered.forEach(r => {
      ['SMR','Patrol'].forEach(role => {
        const s = getRegionStats(p, r, role);
        if (s && s.spend >= 5000 && s.accepted === 0) {
          deadWeight.push({ p, r, role, spend: s.spend });
        }
      });
    });
  });
  // Sort by spend descending, take top 2
  deadWeight.sort((a,b) => b.spend - a.spend);
  deadWeight.slice(0, 2).forEach(dw => {
    insights.push({
      type: 'bad', icon: '!',
      text: <><strong>{PLATFORM_LABELS[dw.p]} {dw.r} · {dw.role}</strong>: <span className="mono">{fmtGBP(dw.spend)}</span> spent with <strong>0 hires</strong> in the whole historic dataset. Either attribution is broken or the audience isn't converting — worth investigating before keeping this line live.</>
    });
  });
  
  // --- Best-in-class efficiency highlight ---
  let best = null;
  PLATFORMS.forEach(p => {
    DATA.regions_ordered.forEach(r => {
      ['SMR','Patrol'].forEach(role => {
        const s = getRegionStats(p, r, role);
        if (s && s.accepted >= 5 && s.cph) {
          if (!best || s.cph < best.cph) best = { p, r, role, cph: s.cph, hires: s.accepted };
        }
      });
    });
  });
  if (best) {
    insights.push({
      type: 'good', icon: '✓',
      text: <>Best-performing slot (Jul 2025 – Apr 2026): <strong>{PLATFORM_LABELS[best.p]} {best.r} · {best.role}</strong> at <span className="mono">{fmtGBP(best.cph)}</span> CPH across {best.hires} hires (HIGH confidence). Worth pushing as much budget there as the vacancy count supports.</>
    });
  }
  
  // --- Coverage vs vacancies ---
  const smrHires = totalPredictedHires(plan, 'SMR', vacancies);
  const patHires = totalPredictedHires(plan, 'Patrol', vacancies);
  const smrVac = Object.values(vacancies.SMR || {}).reduce((a,b)=>a+b, 0);
  const patVac = Object.values(vacancies.Patrol || {}).reduce((a,b)=>a+b, 0);
  const totalHires = smrHires + patHires;
  const totalVac = smrVac + patVac;
  if (totalVac > 0) {
    const coverage = totalHires / totalVac;
    if (coverage < 0.3) {
      insights.push({
        type: 'info', icon: 'i',
        text: <>Current plan covers <strong>{(coverage*100).toFixed(0)}%</strong> of open vacancies (<span className="mono">{totalHires.toFixed(1)}</span> predicted vs <span className="mono">{totalVac}</span> open). Vacancies typically fill over several months — this is expected, but worth watching pacing in Benchmarks.</>
      });
    }
  }
  
  // --- Action CTA if current plan under target ---
  const smrT = hireTargets[monthKey]?.SMR || 0;
  const patT = hireTargets[monthKey]?.Patrol || 0;
  if (smrHires < smrT * 0.8 || patHires < patT * 0.8) {
    const which = smrHires < patHires * (smrT / Math.max(patT, 1)) ? 'SMR' : 'Patrol';
    insights.push({
      type: 'warn', icon: '!',
      text: <>Current plan is below 80% of {which} target. <button className="btn-linkish" onClick={() => { setRoleView(which); setTab('allocation'); }}>Open Allocation for {which} →</button></>
    });
  }
  
  if (insights.length === 0) return null;
  
  return (
    <div className="insights">
      <div className="insights-head">
        <h3>Things to know</h3>
        <div className="small-meta">Auto-generated from current plan + YTD data</div>
      </div>
      {insights.map((ins, i) => (
        <div key={i} className={"insight-item " + ins.type}>
          <span className="insight-icon">{ins.icon}</span>
          <div className="insight-body">{ins.text}</div>
        </div>
      ))}
    </div>
  );
}

function BudgetStrategyRoleCard({ role, plan, monthKey, currentStrategy, minimums, demand, applyStrategyForRole, resetStrategyForRole }) {
  const roleKey = role.toLowerCase();
  const [budgetInput, setBudgetInput] = useState(() => loadMaxBudget(monthKey, role));
  useEffect(() => { setBudgetInput(loadMaxBudget(monthKey, role)); }, [monthKey, role]);
  
  const currentTotal = sumRoleAllPlatforms(plan, role);
  const predicted = totalPredictedHires(plan, role, demand.vacancies);
  const target = demand.hireTargets[monthKey]?.[role] || 0;
  const totalVac = Object.values(demand.vacancies[role] || {}).reduce((a,b)=>a+(+b||0), 0);
  const briefed = getMonthBriefBudget(monthKey, role);
  const fillResult = strategyHitTarget(role, monthKey, demand.hireTargets, demand.vacancies, minimums);
  
  const strategyLabels = {
    fill: 'Fill vacancies',
    max: 'Max hires',
    custom: 'Manually edited',
    none: 'Not set',
  };
  const strategyClass = {
    fill: 'strategy-pill strategy-fill',
    max: 'strategy-pill strategy-max',
    custom: 'strategy-pill strategy-custom',
    none: 'strategy-pill strategy-none',
  };
  
  const applyMaxWithBudget = () => {
    saveMaxBudget(monthKey, role, budgetInput);
    applyStrategyForRole(role, 'max', budgetInput);
  };
  const applyFill = () => applyStrategyForRole(role, 'fill');
  
  const gap = predicted - target;
  const vacGap = totalVac - predicted;
  
  return (
    <div className="bsc-role-card">
      <div className="bsc-role-head">
        <div className={"role-badge " + (role === 'Patrol' ? 'patrol' : '')}>{role}</div>
        <div className={strategyClass[currentStrategy]}>
          <span className="strategy-pill-dot" />
          {strategyLabels[currentStrategy]}
        </div>
      </div>
      <div className="bsc-stats">
        <div className="bsc-stat">
          <div className="bsc-stat-label">Current budget</div>
          <div className="bsc-stat-value">{fmtGBP(currentTotal)}</div>
        </div>
        <div className="bsc-stat">
          <div className="bsc-stat-label">Predicted hires</div>
          <div className="bsc-stat-value">{predicted.toFixed(1)} / <TargetPill role={role} monthKey={monthKey} value={target} label={target} /></div>
          <div className={"bsc-stat-sub " + (gap >= -0.5 ? 'good' : 'bad')}>
            {gap >= -0.5 ? `✓ Target met` : `${gap.toFixed(1)} short of target`}
          </div>
        </div>
        <div className="bsc-stat">
          <div className="bsc-stat-label">Vacancies filled</div>
          <div className="bsc-stat-value">{Math.min(predicted, totalVac).toFixed(0)} / {totalVac}</div>
          <div className="bsc-stat-sub">{totalVac - predicted > 0 ? `${(totalVac - predicted).toFixed(0)} still open` : 'All filled'}</div>
        </div>
      </div>
      
      <BSCSwitcher
        role={role}
        currentStrategy={currentStrategy}
        budgetInput={budgetInput}
        setBudgetInput={setBudgetInput}
        fillResult={fillResult}
        briefed={briefed}
        totalVac={totalVac}
        applyMaxWithBudget={applyMaxWithBudget}
        applyFill={applyFill}
        resetStrategyForRole={resetStrategyForRole}
      />

// ---------- Dashboard target-vs-predicted chart ----------
function DashboardTargetChart({ roleView, smrHires, patrolHires, smrTarget, patrolTarget, smrVacancies, patrolVacancies }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  
  const rolesShown = roleView === 'Combined' ? ['SMR', 'Patrol'] : [roleView];
  const perRole = rolesShown.map(r => ({
    role: r,
    predicted: r === 'SMR' ? smrHires : patrolHires,
    target: r === 'SMR' ? smrTarget : patrolTarget,
    vacancies: r === 'SMR' ? smrVacancies : patrolVacancies,
  }));
  
  useEffect(() => {
    if (!window.Chart || !canvasRef.current) return;
    if (chartRef.current) chartRef.current.destroy();
    
    // Horizontal grouped bars: for each role, show Predicted / Target / Open backlog
    const labels = perRole.map(r => r.role);
    const datasets = [
      {
        label: 'Predicted hires',
        data: perRole.map(r => +r.predicted.toFixed(1)),
        backgroundColor: perRole.map(r => r.predicted >= r.target - 0.5 ? '#4ABD6A' : r.predicted >= r.target * 0.8 ? '#FBAA29' : '#B82318'),
        borderRadius: 4,
      },
      {
        label: 'Monthly target',
        data: perRole.map(r => r.target),
        backgroundColor: '#0A4175',
        borderRadius: 4,
      },
      {
        label: 'Total open vacancies',
        data: perRole.map(r => r.vacancies),
        backgroundColor: '#D7DBE4',
        borderRadius: 4,
      },
    ];
    
    chartRef.current = new window.Chart(canvasRef.current, {
      type: 'bar',
      data: { labels, datasets },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          x: {
            beginAtZero: true,
            ticks: { font: { size: 11 }, stepSize: 10 },
            grid: { color: '#EEF0F4' },
          },
          y: {
            ticks: { font: { size: 13, weight: '700' } },
            grid: { display: false },
          },
        },
        plugins: {
          legend: {
            position: 'bottom',
            labels: { font: { size: 12 }, boxWidth: 12, padding: 12 },
          },
          tooltip: {
            callbacks: {
              label: (ctx) => ctx.dataset.label + ': ' + (typeof ctx.parsed.x === 'number' ? ctx.parsed.x.toFixed(1) : ctx.parsed.x) + ' hires',
            },
          },
        },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [roleView, JSON.stringify(perRole)]);
  
  // Headline reading for the caption
  const captions = perRole.map(r => {
    const gap = r.predicted - r.target;
    const fillPct = r.vacancies > 0 ? (r.predicted / r.vacancies * 100) : 0;
    if (gap >= -0.5) {
      return <><strong>{r.role}</strong>: on track to hit the {r.target} target · covering {fillPct.toFixed(0)}% of the {r.vacancies}-vacancy backlog.</>;
    }
    return <><strong>{r.role}</strong>: <span style={{color:'var(--bad)', fontWeight:600}}>{Math.abs(gap).toFixed(1)} hires short</span> of the {r.target} target at current budget · covering {fillPct.toFixed(0)}% of the {r.vacancies}-vacancy backlog.</>;
  });
  
  return (
    <div className="dash-chart-card">
      <div className="dash-chart-head">
        <div className="dash-chart-title">Predicted vs target{roleView === 'Combined' ? '' : ' · ' + roleView}</div>
        <div className="dash-chart-sub">Based on the current allocation in the Allocation tab</div>

      <div className="dash-chart-canvas" style={{height: rolesShown.length === 1 ? 180 : 240}}>

      </div>
      <div className="dash-chart-captions">
        {captions.map((c, i) => <div key={i}>{c}</div>)}

  );

// ---------- Reusable collapsible section wrapper ----------
// Usage: <CollapsibleSection id="uniq" title="..." subtitle="..." defaultOpen={true}>{children}</CollapsibleSection>
// State persists to localStorage under 'rac-section-collapsed'.
function CollapsibleSection({ id, title, subtitle, defaultOpen = true, flushBody = false, children }) {
  const [collapsed, setCollapsed] = useState(() => {
    try {
      const stored = JSON.parse(localStorage.getItem('rac-section-collapsed') || '{}');
      if (id in stored) return !!stored[id];
      return !defaultOpen;
    } catch { return !defaultOpen; }
  });
  const toggle = () => {
    setCollapsed(prev => {
      try {
        const stored = JSON.parse(localStorage.getItem('rac-section-collapsed') || '{}');
        stored[id] = !prev;
        localStorage.setItem('rac-section-collapsed', JSON.stringify(stored));
      } catch {}
      return !prev;
    });
  };
  return (
    <div className="section">
      <div className="section-head section-head-collapsible" onClick={toggle} title={collapsed ? 'Click to expand' : 'Click to collapse'}>
        <span className="collapse-chevron">{collapsed ? '▸' : '▾'}</span>
        <div style={{flex:1}}>
          <div className="section-title">{title}</div>
          {subtitle && <div className="section-sub">{subtitle}</div>}
        </div>
      </div>
      {!collapsed && (
        <div className={"section-body" + (flushBody ? ' section-body-flush' : '')}>
          {children}
        </div>
      )}
    </div>
  );
}
