// ---------- Allocation Builder ----------
// ---------- Plain-English allocation rationale ----------
function AllocationRationale({ plan, role, vacancies, minimums }) {
  const roleKey = role.toLowerCase();
  const currentTotal = sumRoleAllPlatforms(plan, role);
  if (currentTotal === 0) {
    return (
      <div className="rationale-box empty">
        <strong>Nothing allocated yet for {role}.</strong> Pick a strategy below or hit "Rebuild from demand" and the plan will auto-fill.
      </div>
    );
  }
  
  // Per-platform summary
  const platformDetails = PLATFORMS.map(p => {
    const total = sumPlatformRole(plan, p, role);
    const share = total / currentTotal * 100;
    return { platform: p, total, share };
  }).sort((a, b) => b.total - a.total);
  
  const topPlatform = platformDetails[0];
  const zeroPlatforms = platformDetails.filter(p => p.total < 100);
  const nonzeroPlatforms = platformDetails.filter(p => p.total >= 100);
  
  // For each zero-spend platform, find the region that best illustrates why it was skipped
  // Pattern: "Platform X got £0 — although it's the cheapest in [region], [other platform]
  //           was even cheaper elsewhere so budget went there first."
  // Or: "Platform X got £0 — never the cheapest option in any region with open vacancies."
  const platformSkipReason = (platform) => {
    const regionsWithVac = DATA.regions_ordered.filter(r => (vacancies[role]?.[r] || 0) > 0);
    // Where does this platform win (cheapest) vs lose?
    const wins = [];   // regions where this platform is cheapest
    const nearMisses = [];  // regions where this platform is 2nd cheapest by a small margin
    regionsWithVac.forEach(r => {
      const eff = effectiveCPH(platform, r, role);
      if (!eff) return;
      const others = PLATFORMS.filter(p => p !== platform).map(p => {
        const e = effectiveCPH(p, r, role);
        return e ? { p, cph: e.cph } : null;
      }).filter(Boolean);
      if (others.length === 0) return;
      const bestOther = others.reduce((a, b) => a.cph < b.cph ? a : b);
      if (eff.cph < bestOther.cph) {
        wins.push({ region: r, myCph: eff.cph, nextBest: bestOther });
      } else {
        const gap = ((eff.cph - bestOther.cph) / bestOther.cph) * 100;
        nearMisses.push({ region: r, myCph: eff.cph, gap, winner: bestOther });
      }
    });
    
    if (wins.length > 0) {
      // Platform wins somewhere but still got £0 — capacity constraint
      const w = wins[0];
      return <>technically the cheapest in <strong>{w.region}</strong> (<span className="mono">{fmtGBP(w.myCph)}</span> vs <span className="mono">{fmtGBP(w.nextBest.cph)}</span> for {PLATFORM_LABELS[w.nextBest.p]}), but the vacancies there were already filled by the budget reserved for {PLATFORM_LABELS[w.nextBest.p]} or the minimum spend floor was below &pound;100 after other regions were covered.</>;
    }
    // Find the closest the platform came to being competitive
    if (nearMisses.length > 0) {
      const closest = nearMisses.reduce((a, b) => a.gap < b.gap ? a : b);
      return <>never the cheapest option anywhere for {role}. Closest was <strong>{closest.region}</strong> where it was <strong>{closest.gap.toFixed(0)}% more expensive</strong> than {PLATFORM_LABELS[closest.winner.p]} (<span className="mono">{fmtGBP(closest.myCph)}</span> vs <span className="mono">{fmtGBP(closest.winner.cph)}</span>).</>;
    }
    return <>not enough historic data for {role} in the regions with open vacancies to allocate confidently.</>;
  };
  
  // Region-level flags: "this region has N vacancies but got £0 — here's why"
  // Explains specifically WHY the algorithm passed on it:
  //   (a) no historic data at all → flagged
  //   (b) data exists but other regions were cheaper per hire → flagged with CPH comparison
  //   (c) budget ran out before reaching it (capacity constraint in Max Hires mode)
  const regionReasons = [];
  DATA.regions_ordered.forEach(r => {
    const vac = vacancies[role]?.[r] || 0;
    if (vac < 3) return;  // only bother flagging regions with meaningful vacancy counts
    const regionSpend = PLATFORMS.reduce((s, p) => s + (plan[p]?.[roleKey]?.[r] || 0), 0);
    if (regionSpend >= 100) return;  // spend is live here
    
    // Work out why: find the cheapest platform for this region and compare to plan average
    let cheapestPlatform = null, cheapestCph = Infinity;
    PLATFORMS.forEach(p => {
      const eff = effectiveCPH(p, r, role);
      if (eff && eff.cph < cheapestCph) {
        cheapestPlatform = p;
        cheapestCph = eff.cph;
      }
    });
    if (!cheapestPlatform) {
      regionReasons.push({
        region: r, vac,
        reason: <>no historic data for {role} here, so the tool can&rsquo;t size a confident allocation.</>,
      });
      return;
    }
    // Compare to the average CPH across regions that DID get spend
    const spentRegions = DATA.regions_ordered.filter(r2 => {
      const v = PLATFORMS.reduce((s, p) => s + (plan[p]?.[roleKey]?.[r2] || 0), 0);
      return v >= 100;
    });
    if (spentRegions.length === 0) {
      regionReasons.push({
        region: r, vac,
        reason: <>the budget ran out before reaching it. Increase the Max Hires budget to cover it.</>,
      });
      return;
    }
    // Average CPH across funded regions, weighted by spend
    let weightedCph = 0, totalSpent = 0;
    spentRegions.forEach(r2 => {
      PLATFORMS.forEach(p => {
        const s = plan[p]?.[roleKey]?.[r2] || 0;
        const eff = effectiveCPH(p, r2, role);
        if (s > 0 && eff) {
          weightedCph += s;  // spend is our weight; cph is implicit in (spend/cph = hires)
          totalSpent += s / eff.cph;  // hires
        }
      });
    });
    const funded_avg_cph = totalSpent > 0 ? weightedCph / totalSpent : null;
    
    if (funded_avg_cph && cheapestCph > funded_avg_cph * 1.3) {
      // This region's cheapest CPH is materially more expensive than what we're funding
      regionReasons.push({
        region: r, vac,
        reason: <>cheapest here is {PLATFORM_LABELS[cheapestPlatform]} at <span className="mono">{fmtGBP(cheapestCph)}</span> per hire, which is <strong>{((cheapestCph / funded_avg_cph - 1) * 100).toFixed(0)}% more expensive</strong> than the average of regions we&rsquo;re funding (<span className="mono">{fmtGBP(funded_avg_cph)}</span>). The budget prioritised cheaper hires first.</>,
      });
    } else {
      // Similar or lower CPH — so it's a capacity/budget issue
      regionReasons.push({
        region: r, vac,
        reason: <>CPH is competitive ({PLATFORM_LABELS[cheapestPlatform]} at <span className="mono">{fmtGBP(cheapestCph)}</span>) but the budget ran out before reaching it. Increase the Max Hires budget to cover it.</>,
      });
    }
  });
  
  return (
    <div className="rationale-box">
      <div className="rationale-title">Why this split</div>
      <div className="rationale-body">
        <p>
          <strong>{fmtGBP(currentTotal)}</strong> across {nonzeroPlatforms.length} platform{nonzeroPlatforms.length === 1 ? '' : 's'}. Biggest share: <strong>{PLATFORM_LABELS[topPlatform.platform]} ({topPlatform.share.toFixed(0)}%)</strong> — lowest cost per hire for {role} across the regions we&rsquo;re covering. Other platforms pick up smaller shares where they happen to be cheaper, or hit their exposure minimum.
        </p>
        
        {zeroPlatforms.length > 0 && (
          <div className="rationale-zero-block">
            <div className="rationale-zero-head">Platforms with £0:</div>
            <ul className="rationale-zero-list">
              {zeroPlatforms.map(p => (
                <li key={p.platform}>
                  <strong>{PLATFORM_LABELS[p.platform]}</strong> — {platformSkipReason(p.platform)}
                </li>
              ))}
            </ul>
          </div>
        )}
        
        {regionReasons.length > 0 && (
          <div className="rationale-region-block">
            <div className="rationale-zero-head">Regions with open vacancies but no meaningful spend:</div>
            <ul className="rationale-zero-list">
              {regionReasons.slice(0, 5).map(({ region, vac, reason }) => (
                <li key={region}>
                  <strong>{region}</strong> ({vac} open) — {reason}
                </li>
              ))}
              {regionReasons.length > 5 && <li className="small-meta">+ {regionReasons.length - 5} more similar.</li>}
            </ul>
          </div>
        )}
      </div>
    </div>
  );
}

  // Build platform totals
  const platformData = PLATFORMS.map(p => {
    const smr = sumPlatformRole(plan, p, 'SMR');
    const patrol = sumPlatformRole(plan, p, 'Patrol');
    return {
      platform: PLATFORM_LABELS[p],
      smr: roleView === 'Patrol' ? 0 : smr,
      patrol: roleView === 'SMR' ? 0 : patrol,
      total: (roleView === 'Patrol' ? patrol : (roleView === 'SMR' ? smr : smr + patrol)),
    };
  });
  
  // Build region totals (summed across platforms)
  const regionData = DATA.regions_ordered.map(r => {
    let smr = 0, patrol = 0;
    PLATFORMS.forEach(p => {
      smr += plan[p]?.smr?.[r] || 0;
      patrol += plan[p]?.patrol?.[r] || 0;
    });
    return {
      region: r,
      smr: roleView === 'Patrol' ? 0 : smr,
      patrol: roleView === 'SMR' ? 0 : patrol,
      total: (roleView === 'Patrol' ? patrol : (roleView === 'SMR' ? smr : smr + patrol)),
    };
  }).filter(d => d.total > 0).sort((a, b) => b.total - a.total);
  
  const grandTotal = platformData.reduce((s, d) => s + d.total, 0);
  
  useEffect(() => {
    if (!window.Chart || !platformRef.current) return;
    if (platformChart.current) platformChart.current.destroy();

          { label: 'Patrol', data: platformData.map(d => d.patrol), backgroundColor: '#FF6600', borderRadius: 4 },

        responsive: true,

          y: { stacked: showSplit, ticks: { font: { size: 11, weight: '600' } }, grid: { display: false } },
        },
        plugins: {
          legend: { display: showSplit, position: 'bottom', labels: { font: { size: 11 }, boxWidth: 10, padding: 8 } },

              },
            },
          },
        },
      },
    });
    return () => { if (platformChart.current) platformChart.current.destroy(); };
  }, [roleView, JSON.stringify(platformData), grandTotal]);
  
  useEffect(() => {

      type: 'bar',
      data: { labels: regionData.map(d => d.region), datasets },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          x: { stacked: showSplit, ticks: { callback: v => '£' + (v/1000).toFixed(0) + 'k', font: { size: 10 } }, grid: { color: '#EEF0F4' } },
          y: { stacked: showSplit, ticks: { font: { size: 10.5 } }, grid: { display: false } },
        },

          legend: { display: showSplit, position: 'bottom', labels: { font: { size: 11 }, boxWidth: 10, padding: 8 } },
          tooltip: {
            callbacks: {
              label: (ctx) => ctx.dataset.label + ': ' + fmtGBP(ctx.parsed.x),
              afterLabel: (ctx) => {
                const row = regionData[ctx.dataIndex];
                const pct = grandTotal > 0 ? ((row.total / grandTotal) * 100).toFixed(0) : 0;
                return 'Total: ' + fmtGBP(row.total) + ' (' + pct + '%)';
              },
            },
          },

function AllocationBuilder({ plan, setPlan, roleView, setRoleView, monthKey, minimums, setMinimums, planStrategy, setPlanStrategy, applyStrategyForRole, resetStrategyForRole }) {
  const { demand } = useDemand();
  const { vacancies, hireTargets } = demand;
  const [locks, setLocks] = useState({});
  // Collapse state for role sections and platform grids — persisted to localStorage
  const [collapsed, setCollapsed] = useState(() => {
    try {
      const stored = localStorage.getItem('rac-allocation-collapsed');
      return stored ? JSON.parse(stored) : {};
    } catch { return {}; }
  });
  const toggleCollapsed = (key) => {
    setCollapsed(prev => {
      const next = { ...prev, [key]: !prev[key] };
      try { localStorage.setItem('rac-allocation-collapsed', JSON.stringify(next)); } catch {}
      return next;
    });
  };
  const setAllPlatformsCollapsed = (role, value) => {
    setCollapsed(prev => {
      const next = { ...prev };
      PLATFORMS.forEach(p => { next[`platform:${role}:${p}`] = value; });
      try { localStorage.setItem('rac-allocation-collapsed', JSON.stringify(next)); } catch {}
      return next;
    });
  };
  const panes = roleView === 'Combined' ? ['SMR','Patrol'] : [roleView];
  
  // Apply a strategy result + track which one it was (fill vs max vs custom)
  const applyStrategy = (role, strategyResult, kind, ctx) => {
    const roleKey = role.toLowerCase();
    setPlan(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      PLATFORMS.forEach(p => { next[p][roleKey] = strategyResult.platformSplit[p]; });
      return next;
    });
    if (kind && planStrategy && setPlanStrategy) {
      setPlanStrategy({ ...planStrategy, [role]: kind });
    }
    // Snapshot hold-backs so Dashboard/PDF reflect exactly what was applied.
    // Without this, they fall back to live settings and can show a different
    // total than the plan's actual platform spend.
    if (kind === 'max' && ctx && ctx.holdbacks) {
      saveAppliedHoldbacks(monthKey, role, {
        budget: ctx.budget,
        premium: ctx.holdbacks.premium,
        premiumCampaigns: ctx.holdbacks.premiumCampaigns,
        nonStandard: ctx.holdbacks.nonStandard,
        appliedAt: new Date().toISOString(),
      });
    } else if (kind === 'fill') {
      // Fill All doesn't commit hold-backs
      saveAppliedHoldbacks(monthKey, role, null);
    }
  };
  const onSliderChange = (platform, role, region, newVal) => {
    const roleKey = role.toLowerCase();
    setPlan(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      next[platform][roleKey][region] = Math.max(0, Math.round(newVal));
      return next;
    });
    // Manual edit flips strategy to 'custom'
    if (planStrategy && setPlanStrategy && planStrategy[role] !== 'custom') {
      setPlanStrategy({ ...planStrategy, [role]: 'custom' });
    }
  };
  const toggleLock = (platform, role, region) => {
    const key = `${platform}-${role.toLowerCase()}-${region}`;
    setLocks(prev => ({ ...prev, [key]: !prev[key] }));
  };
  const zeroRole = (role) => {
    const roleKey = role.toLowerCase();
    setPlan(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      PLATFORMS.forEach(p => {
        DATA.regions_ordered.forEach(r => { next[p][roleKey][r] = 0; });
      });
      return next;
    });
  };
  
  return (
    <>
      <AllocationOverview plan={plan} roleView={roleView} />
      <MinimumsControl minimums={minimums} setMinimums={setMinimums} />
      <div className="banner banner-info">
        <div className="banner-icon">i</div>
        <div className="banner-body">
          <strong>Two planning questions, one tab.</strong> A answers "what does it cost to hit the target?" B answers "what's the best allocation for a given budget?" Each allocates across every platform × region at once — so if a platform is mostly dead weight for a given role, it collapses toward zero.
        </div>
      </div>
      {panes.map(role => {
        const roleKey = role.toLowerCase();
        const target = hireTargets[monthKey]?.[role] || 0;
        const totalVac = Object.values(vacancies[role] || {}).reduce((a,b)=>a+(+b||0), 0);
        const briefedBudget = getMonthBriefBudget(monthKey, role);
        const A = strategyHitTarget(role, monthKey, hireTargets, vacancies, minimums);
        const currentTotal = sumRoleAllPlatforms(plan, role);
        const currentPredicted = totalPredictedHires(plan, role, vacancies);
        
        const roleCollapseKey = `role:${role}`;
        const isRoleCollapsed = !!collapsed[roleCollapseKey];
        // Detect whether all platform grids are collapsed (for the "expand all" shortcut)
        const allPlatformsCollapsed = PLATFORMS.every(p => collapsed[`platform:${role}:${p}`]);
        return (
          <div className="section" key={role}>
            <div className="section-head section-head-collapsible" onClick={() => toggleCollapsed(roleCollapseKey)} title={isRoleCollapsed ? 'Click to expand' : 'Click to collapse'}>
              <span className="collapse-chevron">{isRoleCollapsed ? '▸' : '▾'}</span>
              <div className={"role-badge " + (role === 'Patrol' ? 'patrol' : '')}>{role}</div>
              <div className="section-title">{role} allocation <span className="small-meta" style={{fontWeight:400, color:'var(--ink-55)'}}>· {role === 'SMR' ? 'Mobile Vehicle Tech' : <>Roadside Tech <span className="superflex-tag">incl. SuperFlex</span></>}</span></div>
              <div className="section-sub" onClick={(e) => e.stopPropagation()}>
                <span className="pill">Vacancies {totalVac}</span>
                <TargetPill role={role} monthKey={monthKey} value={target} label={`Monthly target ${target}`} className="pill target-pill-clickable" />
                <span className="pill">Briefed {fmtGBP(briefedBudget)} <InfoTag popoverKey="brief-budget" /></span>
                {currentPredicted >= target - 0.01
                  ? <span className="pill pill-good">Current {currentPredicted.toFixed(1)} ✓</span>
                  : <span className="pill pill-bad">Current {currentPredicted.toFixed(1)} (gap {(currentPredicted-target).toFixed(1)})</span>}
              </div>
            </div>
            {isRoleCollapsed && (
              <div className="role-collapsed-summary">
                Role collapsed · {fmtGBP(currentTotal)} across all platforms · {currentPredicted.toFixed(1)} predicted hires. Click header to expand.
              </div>
            )}
            {!isRoleCollapsed && <>
            
            {/* Plain-English rationale for current allocation */}
            <AllocationRationale plan={plan} role={role} vacancies={vacancies} minimums={minimums} />
            
            {/* Two strategy cards */}
            <div className="mode-selector mode-selector-two">
              <StrategyCardA
                role={role}
                totalVac={totalVac}
                result={A}
                vacancies={vacancies}
                onApply={() => applyStrategy(role, A, 'fill')}
              />
              <StrategyCardB
                role={role}
                monthKey={monthKey}
                briefedBudget={briefedBudget}
                vacancies={vacancies}
                minimums={minimums}
                onApply={(res, ctx) => applyStrategy(role, res, 'max', ctx)}
              />
            </div>
            
            <div className="strategy-apply-band">
              <span className="small-meta" style={{fontWeight:600, textTransform:'uppercase', letterSpacing:1}}>Current total</span>
              <span className="mono" style={{fontWeight:700, fontSize:15}}>{fmtGBP(currentTotal)}</span>
              <span className="small-meta">→ {currentPredicted.toFixed(1)} hires · {fmtInt(totalExpectedApps(plan, role))} apps</span>
              <button className="btn btn-sm btn-ghost" style={{marginLeft:'auto'}} onClick={() => zeroRole(role)}>Zero all</button>
              <button className="btn btn-sm" onClick={() => applyStrategy(role, A, 'fill')} title="Rebuild this role's allocation from the latest Demand Plan data (fill-all-vacancies)">↻ Rebuild from demand</button>
            </div>
            
            {PLATFORMS.map(platform => {
              const platTotal = sumPlatformRole(plan, platform, role);
              const anyNonZero = Object.values(plan[platform][roleKey]).some(v => v > 0);
              if (platTotal === 0 && !anyNonZero) {
                // Work out WHY this platform got nothing
                let reason = 'cheaper platforms win every region with open vacancies';
                const min = minimums?.[platform] || 0;
                if (min > 0) reason = `exposure minimum is ${fmtGBP(min)} but allocation capacity is full`;
                else {
                  // Check if this platform would have any wins on CPH anywhere
                  const anyWin = DATA.regions_ordered.some(r => {
                    const vac = vacancies[role]?.[r] || 0;
                    if (vac === 0) return false;
                    const eff = effectiveCPH(platform, r, role);
                    if (!eff) return false;
                    const others = PLATFORMS.filter(p => p !== platform).map(p => effectiveCPH(p, r, role)?.cph).filter(x => x);
                    return others.every(o => eff.cph < o);
                  });
                  if (!anyWin) reason = `no region where this is the cheapest option for ${role}`;
                }
                return (
                  <div key={platform} style={{padding:'12px 22px', borderBottom:'1px solid var(--line-c)', display:'flex', alignItems:'center', gap:12, background:'var(--ink-04)'}}>
                    <span style={{fontWeight:600, fontSize:13.5}}>{PLATFORM_LABELS[platform]}</span>
                    <span className="pill">£0 allocated</span>
                    <span className="small-meta" style={{flex:1}}>— {reason}</span>
                  </div>
                );
              }
              return <PlatformAllocGrid key={platform} plan={plan} platform={platform} role={role} roleKey={roleKey}
                         locks={locks} onSliderChange={onSliderChange} toggleLock={toggleLock} vacancies={vacancies}
                         collapsed={!!collapsed[`platform:${role}:${platform}`]}
                         onToggleCollapse={() => toggleCollapsed(`platform:${role}:${platform}`)} />;
            })}
            <div className="platform-collapse-all">
              <button className="btn btn-sm btn-ghost" onClick={() => setAllPlatformsCollapsed(role, !allPlatformsCollapsed)}>
                {allPlatformsCollapsed ? '▾ Expand all platforms' : '▸ Collapse all platforms'}
              </button>
            </div>
            </>}
          </div>
        );
      })}
    </>
  );
}

// ---------- Realism / confidence scoring for a strategy result ----------
// Returns a 0-100 score plus breakdown text
function computeRealismScore(result, role, vacancies) {
  const split = result.platformSplit || {};
  let highSpend = 0, medSpend = 0, lowSpend = 0;
  let totalSpend = 0;
  DATA.regions_ordered.forEach(r => {
    PLATFORMS.forEach(p => {
      const spend = split[p]?.[r] || 0;
      if (spend <= 0) return;
      totalSpend += spend;
      const s = getRegionStats(p, r, role);
      if (s?.accepted >= 5 && s.spend >= 500 && s.cph >= 50) highSpend += spend;
      else if (s?.accepted >= 2 && s.spend >= 500) medSpend += spend;
      else lowSpend += spend;
    });
  });
  // Data confidence: what % of spend sits on HIGH-confidence historical CPH
  const dataConf = totalSpend > 0 ? (highSpend * 1.0 + medSpend * 0.75 + lowSpend * 0.45) / totalSpend : 0;
  // Ambition / realism: how much of the predicted hires vs vacancies
  // (the more you ask for, the less realistic — fill rate penalty)
  const totalVac = Object.values(vacancies?.[role] || {}).reduce((a,b)=>a+(+b||0), 0);
  const fillRate = totalVac > 0 ? (result.predictedHires / totalVac) : 0;
  // Ambition penalty — realistic monthly throughput sits around 30-50% of open backlog.
  // Below 50% = full credit. Above 50% = gentle taper down to 60% floor at 100% (full backlog).
  let ambitionFactor = 1.0;
  if (fillRate > 0.50) {
    const over = fillRate - 0.50;
    ambitionFactor = Math.max(0.60, 1.0 - over * 0.8);
  }
  const score = Math.round(dataConf * ambitionFactor * 100);
  // Build reason breakdown
  const hiPct = totalSpend > 0 ? Math.round(highSpend / totalSpend * 100) : 0;
  const mePct = totalSpend > 0 ? Math.round(medSpend / totalSpend * 100) : 0;
  const loPct = totalSpend > 0 ? Math.round(lowSpend / totalSpend * 100) : 0;
  return {
    score,
    dataConf: Math.round(dataConf * 100),
    ambitionFactor: Math.round(ambitionFactor * 100),
    hiPct, mePct, loPct,
    fillRate: Math.round(fillRate * 100),
    label: score >= 55 ? 'Strong' : score >= 35 ? 'Solid' : 'Directional',
    colour: score >= 55 ? 'good' : score >= 35 ? 'warn' : 'bad',
  };
}

// --- Strategy Card B (Max Hires, editable budget) ---
function StrategyCardB({ role, monthKey, briefedBudget, vacancies, minimums, onApply }) {
  const [budget, setBudget] = useState(() => loadMaxBudget(monthKey, role));
  const [premiumCampaigns, setPremiumCampaigns] = useState(() => loadPremiumCampaigns(monthKey, role));
  // Recompute when monthKey changes to pull the right stored budget
  useEffect(() => { setBudget(loadMaxBudget(monthKey, role)); }, [monthKey, role]);
  useEffect(() => { setPremiumCampaigns(loadPremiumCampaigns(monthKey, role)); }, [monthKey, role]);
  
  // Persist budget change
  useEffect(() => {
    const t = setTimeout(() => saveMaxBudget(monthKey, role, budget), 200);
    return () => clearTimeout(t);
  }, [budget, monthKey, role]);
  // Persist premium campaign count
  useEffect(() => { savePremiumCampaigns(monthKey, role, premiumCampaigns); }, [premiumCampaigns, monthKey, role]);
  
  const holdbacks = computeHoldbacks(role, budget, monthKey, premiumCampaigns);

function PlatformAllocGrid({ plan, platform, role, roleKey, locks, onSliderChange, toggleLock, vacancies, collapsed, onToggleCollapse }) {
  const platTotal = sumPlatformRole(plan, platform, role);
  const withCph = DATA.regions_ordered.map(r => {
    const s = getRegionStats(platform, r, role);
    return { r, cph: (s?.cph && s.accepted >= 2) ? s.cph : null };
  }).filter(x => x.cph !== null);
  const bestCph = withCph.length ? Math.min(...withCph.map(x => x.cph)) : null;
  const worstCph = withCph.length ? Math.max(...withCph.map(x => x.cph)) : null;
  const predictedHires = predictedHiresForPlatform(plan[platform][roleKey], platform, role);
  // Predicted applications: sum across regions for this platform's spend
  const predictedApps = DATA.regions_ordered.reduce((s, r) => s + expectedApps(platform, r, role, plan[platform][roleKey][r] || 0), 0);
  // Count regions with actual spend for the summary line
  const regionsWithSpend = DATA.regions_ordered.filter(r => (plan[platform][roleKey][r] || 0) >= 100).length;
  return (
    <div>
      <div className="platform-grid-header" onClick={onToggleCollapse} title={collapsed ? 'Click to expand' : 'Click to collapse'}>
        <span className="collapse-chevron">{collapsed ? '▸' : '▾'}</span>
        <span style={{fontWeight:700, fontSize:15, color:'var(--rac-navy)'}}>{PLATFORM_LABELS[platform]}</span>
        <span className="pill mono" style={{fontWeight:600}}>{fmtGBP(platTotal)}</span>
        <span className="small-meta">→ {predictedHires.toFixed(1)} hires · {fmtInt(predictedApps)} apps{collapsed ? ` · ${regionsWithSpend} region${regionsWithSpend === 1 ? '' : 's'} funded` : ''}</span>
      </div>
      {!collapsed && (
        <div className="alloc-grid">
          <div className="alloc-header alloc-row">
            <div>Region</div>
            <div>Lock</div>
            <div>Budget</div>
            <div>Historic CPH <InfoTag popoverKey="cph" /></div>
            <div>Exp. Hires <InfoTag popoverKey="predicted-hires" /></div>
            <div>Vac. <InfoTag popoverKey="vacancies-kpi" /></div>
            <div>Share</div>
          </div>
          {DATA.regions_ordered.map(region => (
            <AllocationRow key={platform + role + region}
              region={region} platform={platform} role={role}
              value={plan[platform][roleKey][region] || 0}
              locked={!!locks[`${platform}-${roleKey}-${region}`]}
              total={platTotal} bestCph={bestCph} worstCph={worstCph}
              vacancy={vacancies[role]?.[region] || 0}
              onChange={v => onSliderChange(platform, role, region, v)}
              onLock={() => toggleLock(platform, role, region)}
            />
          ))}
        </div>
      )}
    </div>
  );
}

function AllocationRow({ region, platform, role, value, locked, total, bestCph, worstCph, vacancy, onChange, onLock }) {
  const [localVal, setLocalVal] = useState(value);
  useEffect(() => { setLocalVal(value); }, [value]);
  const debounced = useDebounced(localVal, 160);
  useEffect(() => { if (debounced !== value) onChange(debounced); }, [debounced]);
  const stats = getRegionStats(platform, region, role);
  const cph = stats?.cph;
  const hires = stats?.accepted ?? 0;
  const conf = confidence(hires);
  const expHiresVal = expectedHires(platform, region, role, localVal);
  const share = total > 0 ? (localVal / total) * 100 : 0;
  // Cheapest/Most expensive badges removed — they added noise without value.
  return (
    <div className={"alloc-row" + (vacancy === 0 ? ' dim-row' : '')}>
      <div>{region}</div>
      <div style={{padding:'8px 12px'}}>
        <button className={"lock-btn " + (locked ? 'locked' : '')} onClick={onLock} title={locked ? 'Unlock' : 'Lock'}>
          {locked ? '●' : '○'}
        </button>
      </div>
      <div className="slider-cell">
        <div className="slider-wrap">
          <input type="range" min="0" max={Math.max(15000, value * 2)} step="50"
            value={localVal} onChange={e => setLocalVal(parseInt(e.target.value))} disabled={locked} />
          <input type="text" className="slider-input"
            value={"£" + localVal.toLocaleString('en-GB')}
            onChange={e => { const n = parseInt(e.target.value.replace(/[^0-9]/g, '')) || 0; setLocalVal(n); }}
            disabled={locked} />
        </div>
      </div>
      <div className={cph ? '' : 'dim'} style={{display:'flex', justifyContent:'flex-end', alignItems:'center', gap:6}}>
        {cph ? fmtGBP(cph) : '—'}
        <ConfPill conf={conf} platform={platform} region={region} role={role} />
      </div>
      <div>{expHiresVal.toFixed(1)}</div>
      <div className={vacancy === 0 ? 'dim' : ''}>{vacancy}</div>
      <div>{share.toFixed(1)}%</div>
    </div>
  );
}

// ---------- Fill rate quick-set ----------
function FillRateQuickSet({ setTarget }) {
  const { demand } = useDemand();
  const [monthKey, setMonthKey] = useState(() => localStorage.getItem('rac-current-month') || DATA.default_month);
  useEffect(() => {
    const handler = () => {
      const m = localStorage.getItem('rac-current-month') || DATA.default_month;
      if (m !== monthKey) setMonthKey(m);
    };
    window.addEventListener('storage', handler);
    const id = setInterval(handler, 500);
    return () => { window.removeEventListener('storage', handler); clearInterval(id); };
  }, [monthKey]);
  
  // Preset realism bands — cover them as guidance not hard rules
  const presets = [
    { rate: 20, label: 'Conservative', note: 'Slow month / hard-to-fill regions' },
    { rate: 40, label: 'Typical', note: 'Normal market, solid pipeline' },
    { rate: 60, label: 'Ambitious', note: 'Strong activation, good apply volume' },
    { rate: 100, label: 'Full backlog', note: 'Rarely realistic in one month' },
  ];
  
  const bandLabel = (rate) => {
    if (rate === 0) return 'None';
    if (rate < 30) return 'Conservative';
    if (rate < 50) return 'Typical';
    if (rate < 80) return 'Ambitious';
    return 'Stretch';
  };
  
  return (
    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:16}}>
      {['SMR', 'Patrol'].map(role => {
        const vac = Object.values(demand.vacancies[role] || {}).reduce((a,b)=>a+(+b||0), 0);
        const target = demand.hireTargets[monthKey]?.[role] || 0;
        const briefed = DATA.default_hire_targets_by_month[monthKey]?.[role] || 0;
        const currentRate = vac > 0 ? Math.round((target / vac) * 100) : 0;
        const briefedRate = vac > 0 ? Math.round((briefed / vac) * 100) : 0;
        const setRate = (rate) => {
          const newTarget = Math.round(vac * rate / 100);
          setTarget(monthKey, role, newTarget);
        };
        const setTargetDirect = (val) => {
          setTarget(monthKey, role, Math.max(0, Math.min(vac, parseInt(val) || 0)));
        };
        return (
          <div key={role} className="fill-rate-card">
            <div className="fill-rate-head">
              <span className={"role-badge " + (role === 'Patrol' ? 'patrol' : '')}>{role}</span>
              <span className="small-meta">{role === 'SMR' ? 'Mobile Vehicle Tech' : <>Roadside Tech <span className="superflex-tag">incl. SuperFlex</span></>}</span>
              <span className="fill-rate-band">{bandLabel(currentRate)}</span>
            </div>
            
            <div className="fill-rate-main-stat">
              <div className="fill-rate-label">This month's realistic target for {role}</div>
              <div style={{display:'flex', alignItems:'baseline', gap:10, marginTop:6}}>
                <input
                  type="number" min="0" max={vac}
                  className="fill-rate-target-input"
                  value={target}
                  onChange={e => setTargetDirect(e.target.value)}
                />
                <span style={{color:'var(--ink-55)', fontSize:14}}>/ {vac} open</span>
                <span className="fill-rate-pct">= {currentRate}% of backlog</span>
              </div>
            </div>
            
            <div className="fill-rate-slider">
              <input type="range" min="0" max="100" step="1" value={currentRate} onChange={e => setRate(parseInt(e.target.value))} />
              <div className="fill-rate-preset-grid">
                {presets.map(p => {
                  const active = Math.abs(currentRate - p.rate) < 3;
                  return (
                    <button key={p.rate} className={"fill-rate-preset " + (active ? 'active' : '')} onClick={() => setRate(p.rate)} title={p.note}>
                      <div className="preset-rate">{p.rate}%</div>
                      <div className="preset-label">{p.label}</div>
                      <div className="preset-hires">{Math.round(vac * p.rate / 100)} hires</div>
                    </button>
                  );
                })}
              </div>
            </div>
            
            <div className="fill-rate-footer">
              <span>Briefed baseline: <strong>{briefed} hires</strong> ({briefedRate}%)</span>
              {target !== briefed && (
                <button className="btn-linkish" onClick={() => setTargetDirect(briefed)}>↺ reset to briefed</button>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ---------- Target Feasibility (rebuilt from actual historic data) ----------
// Replaces the old Targets & Health tab. Uses actual historic CPA/CPH blended across
// all platforms + regions for the role, not the proposal flat numbers.
function TargetFeasibility({ plan, monthKey, roleView }) {
  const { demand } = useDemand();
  const { vacancies, hireTargets } = demand;
  
  // Compute actual blended metrics for a role across Jul 2025 - Apr 2026
  const actualMetrics = (role) => {
    let spend = 0, completes = 0, accepted = 0, started = 0;
    PLATFORMS.forEach(p => {
      DATA.regions_ordered.forEach(r => {
        const s = DATA[p]?.[`${r}__${role}`]?.all_time;
        if (!s) return;
        spend += s.spend || 0;
        completes += s.completes || 0;
        accepted += s.accepted || 0;
        started += s.started || 0;
      });
    });
    return {
      spend, completes, accepted, started,
      cpa: completes > 0 ? spend / completes : 0,
      cph: accepted > 0 ? spend / accepted : 0,
      cvr: completes > 0 ? accepted / completes : 0,
    };
  };
  
  const rolesShown = roleView === 'Combined' ? ['SMR', 'Patrol'] : [roleView];
  
  return (
    <div className="feasibility-block">
      <div className="feasibility-intro">
        <strong>Target feasibility — worst-case reference.</strong> The CPH below is our <em>historic blended average</em> — every £ spent divided by every hire we got, including the inefficient campaigns (Meta London, over-spent Indeed regions, etc.). It&rsquo;s the "if we keep spending like we did last year" number. Your actual plan uses optimised regional allocation, which should deliver hires at a materially lower cost — use this section as a ceiling to sanity-check against, not as your plan&rsquo;s prediction.
      </div>
      
      {rolesShown.map(role => {
        const m = actualMetrics(role);
        const target = hireTargets[monthKey]?.[role] || 0;
        const totalVac = Object.values(vacancies[role] || {}).reduce((a, b) => a + (+b || 0), 0);
        const currentBudget = PLATFORMS.reduce((s, p) => s + sumPlatformRole(plan, p, role), 0);
        const currentPred = totalPredictedHires(plan, role, vacancies);
        const briefedBudget = getMonthBriefBudget(monthKey, role);
        
        // Worst-case budget: what it would cost at historic blended CPH (no optimisation)
        const neededAtActual = target * m.cph;
        
        return (
          <div key={role} className="feasibility-card">
            <div className="feasibility-head">
              <span className={"role-badge " + (role === 'Patrol' ? 'patrol' : '')}>{role}</span>
              <span className="small-meta" style={{color:'var(--ink-55)'}}>{role === 'SMR' ? 'Mobile Vehicle Tech' : <>Roadside Tech <span className="superflex-tag">incl. SuperFlex</span></>}</span>
              <span className="pill pill-data">{m.accepted} hires in data</span>
            </div>
            
            {/* Four-stat ribbon: target, historic CPH, worst-case budget, current plan */}
            <div className="feasibility-stats">
              <div className="fstat">
                <div className="fstat-label">Target this month</div>
                <div className="fstat-value">{target}</div>
                <div className="fstat-sub">of {totalVac} open vacancies</div>
              </div>
              <div className="fstat">
                <div className="fstat-label">Historic blended CPH</div>
                <div className="fstat-value mono">{fmtGBP(m.cph)}</div>
                <div className="fstat-sub">{m.accepted} hires · includes wasted spend</div>
              </div>
              <div className="fstat">
                <div className="fstat-label">Worst-case budget <span className="fstat-note">if we repeat history</span></div>
                <div className="fstat-value mono">{fmtGBP(neededAtActual)}</div>
                <div className="fstat-sub">vs briefed {fmtGBP(briefedBudget)}</div>
              </div>
              <div className="fstat">
                <div className="fstat-label">Your current plan</div>
                <div className="fstat-value mono">{fmtGBP(currentBudget)}</div>
                <div className={"fstat-sub " + (currentPred >= target - 0.5 ? 'good' : 'bad')}>
                  → {currentPred.toFixed(1)} predicted ({currentPred >= target - 0.5 ? 'on track' : (currentPred - target).toFixed(1) + ' gap'})
                </div>
              </div>
            </div>
            
            {/* Takeaway — framed around the gap between unoptimised and optimised */}
            <div className="feasibility-takeaway">
              {currentBudget >= neededAtActual * 0.95
                ? <><strong>✓ Plan is at or above the historic worst-case budget.</strong> Even if the new allocation performed no better than last year&rsquo;s blended average, the plan would still hit {target} hires. Optimised regional allocation should deliver noticeably more.</>
                : <><strong>Plan is £{fmtInt(neededAtActual - currentBudget)} below the worst-case figure.</strong> That&rsquo;s fine — we&rsquo;re deliberately avoiding the inefficient spend that dragged the blended average up. The Allocation tab&rsquo;s prediction ({currentPred.toFixed(1)} hires) is what the data says this budget should actually deliver when deployed optimally.</>
              }
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ---------- Benchmarks ----------
function BenchmarksView({ roleView, plan, monthKey }) {
  const [metric, setMetric] = useState('cph');
  const [platformView, setPlatformView] = useState('indeed');
  const chartRef = useRef(null);
  const chartInstance = useRef(null);
  
  // Chart.js instance for the single-platform deep-dive
  useEffect(() => {
    if (!chartRef.current) return;
    if (chartInstance.current) chartInstance.current.destroy();
    const labels = DATA.regions_ordered;
    const cphData = labels.map(r => {
      const s = getRegionStats(platformView, r, roleView);
      return (s?.cph && s.accepted >= 2 && s.spend >= 500) ? s.cph : null;
    });
    const spendData = labels.map(r => {
      const s = getRegionStats(platformView, r, roleView);
      return s?.spend || 0;
    });
    chartInstance.current = new Chart(chartRef.current, {
      type: 'bar',
      data: { labels, datasets: [
        { label: 'Historic Spend (£)', data: spendData, backgroundColor: '#003366', borderRadius: 2, yAxisID: 'y', order: 2 },
        { label: 'CPH (£)', data: cphData, type: 'line', borderColor: '#FF6600', backgroundColor: '#FF6600', yAxisID: 'y1', spanGaps: false, order: 1, pointRadius: 5, tension: 0.15 },
      ]},
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'top', labels: { font: { family: 'Inter', size: 12 }, color: '#111318' } },
          tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': £' + (ctx.raw ? ctx.raw.toLocaleString('en-GB') : '—') } }
        },
        scales: {
          x: { ticks: { font: { family: 'Inter', size: 11 }, color: '#111318B3', maxRotation: 45, minRotation: 30 }, grid: { display: false } },
          y: { type: 'linear', position: 'left', title: { display: true, text: 'Spend (£)', font: { family: 'Inter', size: 11 } } },
          y1: { type: 'linear', position: 'right', title: { display: true, text: 'CPH (£)', font: { family: 'Inter', size: 11 } }, grid: { display: false } },
        },
      },
    });
    return () => { if (chartInstance.current) chartInstance.current.destroy(); };
  }, [roleView, platformView]);
  
  const getAgg = (platform, region, role) => {
    return DATA[platform]?.[`${region}__${role}`]?.all_time || { spend: 0, completes: 0, accepted: 0, started: 0 };
  };
  
  const sumAggs = (aggs) => {
    const totals = { spend: 0, completes: 0, accepted: 0, started: 0 };
    aggs.forEach(a => {
      totals.spend += a.spend || 0;
      totals.completes += a.completes || 0;
      totals.accepted += a.accepted || 0;
      totals.started += a.started || 0;
    });
    totals.cpa = totals.completes > 0 ? totals.spend / totals.completes : null;
    totals.cph = totals.accepted > 0 ? totals.spend / totals.accepted : null;
    totals.cvr = totals.completes > 0 ? totals.accepted / totals.completes : null;
    return totals;
  };
  
  const platformRollup = PLATFORMS.map(p => {
    const rows = DATA.regions_ordered.map(r => getAgg(p, r, roleView));
    return { platform: p, ...sumAggs(rows) };
  });
  const allPlatformsAgg = sumAggs(platformRollup.map(p => ({ spend: p.spend, completes: p.completes, accepted: p.accepted, started: p.started })));
  
  const regionRollup = DATA.regions_ordered.map(r => {
    const rows = PLATFORMS.map(p => getAgg(p, r, roleView));
    return { region: r, ...sumAggs(rows) };
  });
  
  const cellValues = {};
  const allCphs = [];
  DATA.regions_ordered.forEach(r => {
    PLATFORMS.forEach(p => {
      const a = sumAggs([getAgg(p, r, roleView)]);
      cellValues[`${p}__${r}`] = a;
      if (a.cph && a.accepted >= 2) allCphs.push(a.cph);
    });
  });
  const minCph = allCphs.length ? Math.min(...allCphs) : 0;
  const maxCph = allCphs.length ? Math.max(...allCphs) : 1;
  
  // Compute per-metric value ranges so the colour scale works for whichever metric is toggled
  const valueRanges = { cph: [], cpa: [], cvr: [], spend: [], hires: [] };
  DATA.regions_ordered.forEach(r => {
    PLATFORMS.forEach(p => {
      const a = cellValues[`${p}__${r}`];
      if (a.cph && a.accepted >= 2) valueRanges.cph.push(a.cph);
      if (a.cpa) valueRanges.cpa.push(a.cpa);
      if (a.cvr) valueRanges.cvr.push(a.cvr);
      if (a.spend > 0) valueRanges.spend.push(a.spend);
      if (a.accepted > 0) valueRanges.hires.push(a.accepted);
    });
  });
  const metricRange = {};
  Object.keys(valueRanges).forEach(k => {
    if (valueRanges[k].length) metricRange[k] = { min: Math.min(...valueRanges[k]), max: Math.max(...valueRanges[k]) };
  });
  // Direction: for CPH/CPA lower is better, for CVR/Spend/Hires higher is better
  const lowerIsBetter = { cph: true, cpa: true, cvr: false, spend: false, hires: false };
  
  const heatColour = (val, metricName) => {
    if (!val || val <= 0 || !metricRange[metricName]) return null;
    const { min, max } = metricRange[metricName];
    if (max === min) return null;
    let t = (val - min) / (max - min);
    if (!lowerIsBetter[metricName]) t = 1 - t;
    t = Math.min(1, Math.max(0, t));
    let r, g, b;
    if (t < 0.5) {
      const u = t * 2;
      r = Math.round(14 + (251-14)*u);
      g = Math.round(124 + (170-124)*u);
      b = Math.round(58 + (41-58)*u);
    } else {
      const u = (t - 0.5) * 2;
      r = Math.round(251 - (251-184)*u);
      g = Math.round(170 - (170-35)*u);
      b = Math.round(41 - (41-24)*u);
    }
    return `rgba(${r}, ${g}, ${b}, 0.22)`;
  };
  
  const displayMetric = (a) => {
    if (metric === 'cph') {
      if (!a.cph || a.accepted < 2) return { display: '—', noData: true };
      return { display: fmtGBP(a.cph), value: a.cph };
    }
    if (metric === 'cpa') {
      if (!a.cpa) return { display: '—', noData: true };
      return { display: fmtGBP(a.cpa, 2), value: a.cpa };
    }
    if (metric === 'cvr') {
      if (!a.cvr) return { display: '—', noData: true };
      return { display: fmtPct(a.cvr, 2), value: a.cvr };
    }
    if (metric === 'spend') return { display: fmtGBP(a.spend), value: a.spend };
    if (metric === 'hires') return { display: a.accepted, value: a.accepted };
    return { display: '—', noData: true };
  };
  
  return (
    <>
      {/* Target feasibility — folded in from the retired Targets & Health tab */}
      <TargetFeasibility plan={plan} monthKey={monthKey} roleView={roleView} />
      
      <div className="banner banner-info">
        <div className="banner-icon">i</div>
        <div className="banner-body">
          <strong>Benchmarks — {roleView}.</strong> Aggregated Jul 2025 – Apr 2026 across all platforms and regions. Switch SMR / Patrol / Combined using the role toggle in the header. The bottom pivot is the most useful view — shows which platform wins for each region.
        </div>
      </div>
      
      <CollapsibleSection id="bench-by-platform" title="By platform" subtitle={"All regions combined · " + roleView} defaultOpen={true} flushBody={true}>
        <table className="bench-pivot">
          <thead><tr>
            <th>Platform</th>
            <th>Spend</th>
            <th>Completes <InfoTag popoverKey="completes" /></th>
            <th>Hires <InfoTag popoverKey="hires" /></th>
            <th>CPA <InfoTag popoverKey="cpa" /></th>
            <th>CVR <InfoTag popoverKey="cvr" /></th>
            <th>CPH <InfoTag popoverKey="cph" /></th>
          </tr></thead>
          <tbody>
            {platformRollup.map(p => (
              <tr key={p.platform}>
                <td>{PLATFORM_LABELS[p.platform]}</td>
                <td>{fmtGBP(p.spend)}</td>
                <td>{fmtInt(p.completes)}</td>
                <td>{p.accepted}</td>
                <td>{p.cpa ? fmtGBP(p.cpa, 2) : '—'}</td>
                <td>{p.cvr ? fmtPct(p.cvr) : '—'}</td>
                <td>{p.cph ? fmtGBP(p.cph) : '—'}</td>
              </tr>
            ))}
            <tr className="total-row">
              <td>TOTAL (all platforms)</td>
              <td>{fmtGBP(allPlatformsAgg.spend)}</td>
              <td>{fmtInt(allPlatformsAgg.completes)}</td>
              <td>{allPlatformsAgg.accepted}</td>
              <td>{allPlatformsAgg.cpa ? fmtGBP(allPlatformsAgg.cpa, 2) : '—'}</td>
              <td>{allPlatformsAgg.cvr ? fmtPct(allPlatformsAgg.cvr) : '—'}</td>
              <td>{allPlatformsAgg.cph ? fmtGBP(allPlatformsAgg.cph) : '—'}</td>
            </tr>
          </tbody>
        </table>
      </CollapsibleSection>
      
      <CollapsibleSection id="bench-by-region" title="By region" subtitle={"All platforms combined · " + roleView} defaultOpen={false} flushBody={true}>
        <table className="bench-pivot">
          <thead><tr>
            <th>Region</th>
            <th>Spend</th>
            <th>Completes</th>
            <th>Hires</th>
            <th>CPA</th>
            <th>CVR</th>
            <th>CPH</th>
          </tr></thead>
          <tbody>
            {regionRollup.map(r => (
              <tr key={r.region}>
                <td>{r.region}</td>
                <td>{fmtGBP(r.spend)}</td>
                <td>{fmtInt(r.completes)}</td>
                <td>{r.accepted}</td>
                <td>{r.cpa ? fmtGBP(r.cpa, 2) : '—'}</td>
                <td>{r.cvr ? fmtPct(r.cvr) : '—'}</td>
                <td>{r.cph ? fmtGBP(r.cph) : '—'}</td>
              </tr>
            ))}
            <tr className="total-row">
              <td>TOTAL (all regions)</td>
              <td>{fmtGBP(allPlatformsAgg.spend)}</td>
              <td>{fmtInt(allPlatformsAgg.completes)}</td>
              <td>{allPlatformsAgg.accepted}</td>
              <td>{allPlatformsAgg.cpa ? fmtGBP(allPlatformsAgg.cpa, 2) : '—'}</td>
              <td>{allPlatformsAgg.cvr ? fmtPct(allPlatformsAgg.cvr) : '—'}</td>
              <td>{allPlatformsAgg.cph ? fmtGBP(allPlatformsAgg.cph) : '—'}</td>
            </tr>
          </tbody>
        </table>
      </CollapsibleSection>
      
      <div className="section">
        <div className="section-head">
          <div className="section-title">Pivot · region × platform</div>
          <div className="section-sub">
            <span className="toggle-label">Metric</span>
            <div className="metric-toggle">
              {['cph','cpa','cvr','spend','hires'].map(m => (
                <button key={m} className={metric === m ? 'active' : ''} onClick={() => setMetric(m)}>{m.toUpperCase()}</button>
              ))}
            </div>
          </div>
        </div>
        <div className="section-body section-body-flush">
          <table className="bench-pivot">
            <thead><tr>
              <th>Region</th>
              {PLATFORMS.map(p => <th key={p}>{PLATFORM_LABELS[p]}</th>)}
              <th>All</th>
            </tr></thead>
            <tbody>
              {DATA.regions_ordered.map(region => {
                let bestPlatform = null;
                {
                  const values = PLATFORMS.map(p => {
                    const a = cellValues[`${p}__${region}`];
                    const dm = displayMetric(a);
                    return { platform: p, value: dm.noData ? null : dm.value };
                  }).filter(x => x.value !== null && x.value > 0);
                  if (values.length) {
                    const cmp = lowerIsBetter[metric] ? ((a,b) => a.value < b.value ? a : b) : ((a,b) => a.value > b.value ? a : b);
                    bestPlatform = values.reduce(cmp).platform;
                  }
                }
                const rowTotal = sumAggs(PLATFORMS.map(p => cellValues[`${p}__${region}`]));
                return (
                  <tr key={region}>
                    <td>{region}</td>
                    {PLATFORMS.map(p => {
                      const a = cellValues[`${p}__${region}`];
                      const r = displayMetric(a);
                      const isBest = p === bestPlatform;
                      const bg = (r.value && !r.noData) ? heatColour(r.value, metric) : null;
                      const cls = 'pivot-cell' + (r.noData ? ' no-data' : '') + (isBest ? ' best' : '');
                      return (
                        <td key={p} className={cls} style={bg ? {backgroundColor: bg} : undefined}>
                          {r.display}
                        </td>
                      );
                    })}
                    <td>{displayMetric(rowTotal).display}</td>
                  </tr>
                );
              })}
              <tr className="total-row">
                <td>All regions</td>
                {PLATFORMS.map(p => {
                  const a = platformRollup.find(x => x.platform === p);
                  return <td key={p}>{displayMetric(a).display}</td>;
                })}
                <td>{displayMetric(allPlatformsAgg).display}</td>
              </tr>
            </tbody>
          </table>
        </div>
        <div style={{padding:'12px 22px', background:'var(--ink-04)', borderTop:'1px solid var(--line-c)'}}>
            <div style={{display:'flex', alignItems:'center', gap:16, flexWrap:'wrap'}}>
              <div style={{display:'flex', alignItems:'center', gap:10}}>
                <span style={{fontSize:11, fontWeight:600, color:'var(--ink-55)', textTransform:'uppercase', letterSpacing:1}}>Legend</span>
                <div style={{display:'flex', alignItems:'center', gap:6}}>
                  <span style={{fontSize:11, color:'var(--ink-55)'}}>{lowerIsBetter[metric] ? 'Cheap / low' : 'Low / weak'}</span>
                  <div style={{width:140, height:12, borderRadius:4, background: lowerIsBetter[metric] ? 'linear-gradient(90deg, rgba(14,124,58,0.55), rgba(251,170,41,0.55), rgba(184,35,24,0.55))' : 'linear-gradient(90deg, rgba(184,35,24,0.55), rgba(251,170,41,0.55), rgba(14,124,58,0.55))', border:'1px solid var(--line-c)'}} />
                  <span style={{fontSize:11, color:'var(--ink-55)'}}>{lowerIsBetter[metric] ? 'Expensive / high' : 'High / strong'}</span>
                </div>
              </div>
              <div style={{fontSize:11.5, color:'var(--ink-55)', lineHeight:1.45, flex:'1 1 280px'}}>
                {lowerIsBetter[metric] ? <>Green = lower is better (what you want for <strong>{metric.toUpperCase()}</strong>).</> : <>Green = higher is better (what you want for <strong>{metric.toUpperCase()}</strong>).</>} <strong style={{color:'var(--rac-navy)'}}>Bold</strong> = best platform for that region. <strong>"—"</strong> = too little data (fewer than 2 hires).
              </div>
            </div>
          </div>
      </div>
      
      {/* Single-platform deep dive: chart + monthly breakdown */}
      <div className="section">
        <div className="section-head">
          <div className="section-title">Platform deep-dive</div>
          <div className="section-sub">
            <span className="toggle-label">Platform</span>
            <div className="metric-toggle">
              {PLATFORMS.map(p => (
                <button key={p} className={platformView === p ? 'active' : ''} onClick={() => setPlatformView(p)}>{PLATFORM_LABELS[p]}</button>
              ))}
            </div>
          </div>
        </div>
        <div className="section-body">
          <div style={{height: 340, position: 'relative'}}>
            <canvas ref={chartRef}></canvas>
          </div>
          <div className="small-meta" style={{marginTop: 12, lineHeight: 1.55}}>
            Bars show spend, line shows CPH per region for <strong>{PLATFORM_LABELS[platformView]} · {roleView}</strong>. Regions where the CPH line is low but the spend bar is high = efficient, invest more. High bar, no CPH line = money spent without hires (Meta London is the classic example).
          </div>
        </div>
      </div>
      
      <MonthlyBreakdown roleView={roleView} platformView={platformView} />
    </>
  );
}

  return (
    <div className="section">

            <tr>
              <th>Region</th>
              {months.map(m => <th key={m}>{monthShort(m)}</th>)}
              <th>Total</th>
            </tr>
