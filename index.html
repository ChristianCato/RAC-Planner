            {DATA.regions_ordered.map(r => {
              const key = `${r}__${roleView}`;
              const platData = DATA[platformView]?.[key];
              const monthly = platData?.monthly || {};
              let totalSpend = 0, totalHires = 0;
              return (
                <React.Fragment key={r}>
                  <tr onClick={() => setExpanded(expanded === r ? null : r)} style={{cursor:'pointer'}}>
                    <td>{expanded === r ? '▾' : '▸'} {r}</td>
                    {months.map(m => {
                      const d = monthly[m];
                      const spend = d?.spend || 0;
                      const hires = d?.accepted || 0;
                      totalSpend += spend;
                      totalHires += hires;
                      return <td key={m} className={spend > 0 ? '' : 'dim'}>{spend > 0 ? fmtGBP(spend) : '—'}</td>;
                    })}
                    <td style={{fontWeight:600}}>{fmtGBP(totalSpend)}</td>
                  </tr>
                  {expanded === r && (
                    <tr style={{background:'var(--ink-04)'}}>
                      <td style={{fontStyle:'italic', fontSize:10.5, color:'var(--ink-55)'}}>↳ Hires</td>
                      {months.map(m => {
                        const d = monthly[m];
                        const hires = d?.accepted || 0;
                        return <td key={m} style={{fontSize:11}} className={hires > 0 ? '' : 'dim'}>{hires > 0 ? hires : '—'}</td>;
                      })}
                      <td style={{fontWeight:600, fontSize:11}}>{totalHires}</td>
                    </tr>
                  )}
                </React.Fragment>
              );
            })}
          </tbody>
        </table>
      </div>
      <div style={{padding:'10px 22px', background:'var(--ink-04)', borderTop:'1px solid var(--line-c)'}}>
        <span className="small-meta">Click any region row to expand and see monthly hire counts alongside spend.</span>
      </div>
    </div>
  );
}


// ---------- Assumptions / tool configuration reference ----------
// Read-only summary of every thumb-on-the-scale applied in-tool. The goal
// is internal: when a number shifts or a pattern surprises us, we can check
// here in 10 seconds rather than grepping the code. Any new adjustment (model
// weight, fixed rate, fallback threshold) should earn an entry here.
function AssumptionsView() {
  const assumptions = [
    {
      group: 'Cost adjustments',
      items: [
        {
          label: 'Google +20% CPH / CPA uplift',
          value: '\u00d71.20',
          status: 'active',
          why: 'Google\u2019s per-region CPH reads artificially low because \u223c47% of historic Google spend is recorded at platform level with no UK region attached (see Data quality below). The regional entries we do have show a smaller cost base than reality, so the allocator would otherwise over-weight Google. The 20% uplift partially compensates until the source feed is fixed.',
          where: 'getRegionStats() + platformRoleCPH()',
          revisit: 'When Meta & Google exports ship properly geo-tagged spend \u2014 expect this to come off.',
        },
      ],
    },
    {
      group: 'Data quality',
      items: [
        {
          label: 'Meta unattributed spend',
          value: '\u223c41%',
          status: 'active',
          why: 'Of \u00a3191,897 all-time Meta spend (Jul 2025 \u2013 Apr 2026), only \u00a3112,747 is tagged to a UK region. The other \u00a379,150 sits on platform-level campaigns without a region on the export. Regional CPH reads from the tagged \u00a3112k only \u2014 so Meta\u2019s effective CPH in the tool is somewhat under-stated. Hire counts reconcile cleanly, so the ratio isn\u2019t catastrophic, just understated.',
          where: 'DATA.meta.{region}__{role}.all_time',
          revisit: 'Meta export needs geo-targeting column populated. Data-team task.',
        },
        {
          label: 'Google unattributed spend',
          value: '\u223c47%',
          status: 'active',
          why: 'Of \u00a3120,091 all-time Google spend, only \u00a363,838 is region-tagged. The other \u00a356,254 is on untargeted or national-geo campaigns. The 20% Google uplift above is a temporary compensating adjustment for this.',
          where: 'DATA.google.{region}__{role}.all_time',
          revisit: 'Same as Meta \u2014 source feed fix needed.',
        },
        {
          label: 'Indeed & Appcast attribution',
          value: '100% \u00b7 92%',
          status: 'active',
          why: 'Indeed is fully geo-attributed \u2014 \u00a3246,835 overall matches sum of regional entries to the penny. Appcast is 92% attributed (\u00a33,593 unattributed of \u00a347,140), small enough to ignore.',
          where: 'DATA.indeed / DATA.appcast',
        },
        {
          label: '2025 calendar year reconciliation',
          value: '\u00a3143,856',
          status: 'active',
          why: 'Google 2025 \u00a364,426 + Meta 2025 \u00a379,430 = \u00a3143,856. Matches Enhance records of actual Google + Meta outlay across the year. Top-line spend is correct \u2014 only the geo-attribution is incomplete.',
          where: 'DATA.{platform}.OVERALL.year_2025',
        },
      ],
    },
    {
      group: 'Allocation strategy',
      items: [
        {
          label: 'Max Hires — 70 / 30 efficiency / coverage split',
          value: '70 / 30',
          status: 'active',
          why: '70% of budget goes to the cheapest region-platform pairs by CPH. 30% is reserved for coverage across other regions with open vacancies, so the plan doesn\u2019t concentrate in just 2-3 cheap regions and abandon expensive-but-necessary ones like London.',
          where: 'strategyMaxHires() — MAX_HIRES_WEIGHT / COVERAGE_WEIGHT',
          revisit: 'If client feedback shows coverage gaps, push toward 60/40; if too-diffuse, 80/20.',
        },
        {
          label: 'Fill All \u2014 cheapest CPH per region',
          value: 'min(CPH)',
          status: 'active',
          why: 'For each region with vacancies, picks whichever platform has the cheapest effective CPH and allocates enough budget to hire into every open slot at that rate. No cross-platform blend.',
          where: 'strategyHitTarget()',
        },
      ],
    },
    {
      group: 'Hold-backs',
      items: [
        {
          label: 'Indeed Premium — £44 / day / campaign',
          value: '\u00a3' + INDEED_PREMIUM_RATE_PER_DAY + ' / day',
          status: 'active',
          why: 'Flat daily rate per sponsored Indeed campaign. Selectable per role: 0 (no Premium), 3, 4, or 5 campaigns. Default 3. Deducted from role budget before regional allocation.',
          where: 'INDEED_PREMIUM_RATE_PER_DAY, INDEED_PREMIUM_OPTIONS, computeHoldbacks()',
        },
        {
          label: 'Awareness & Consideration \u2014 10% cross-role reserve',
          value: '10%',
          status: 'active',
          why: 'Flat 10% of combined budget held back for brand / top-of-funnel activity. Treated as a cross-role reserve rather than split per role \u2014 shown as one number at the top of the Dashboard, not on individual strategy cards. Math-wise: each role still contributes 10% of its own budget to the pot, proportional to its share of total. So a \u00a335k SMR / \u00a328k Patrol plan yields \u00a33,500 + \u00a32,800 = \u00a36,300 reserve.',
          where: 'NONSTANDARD_HOLDBACK_RATE, computeHoldbacks()',
        },
      ],
    },
    {
      group: 'CPH reliability rules',
      items: [
        {
          label: 'Confidence tiers (label only, does not modify math)',
          value: 'HIGH 5+ · MED 3\u20134 · LOW 1\u20132',
          status: 'active',
          why: 'Based on accepted hires in the 10-month window per region × platform × role. Tier is displayed as a transparency flag; the CPH used in allocation is the raw number either way.',
          where: 'effectiveCPH()',
        },
        {
          label: 'Fallback: regional CPH requires real data',
          value: '\u22651 hire, \u2265\u00a3500 spend, CPH \u2265\u00a350',
          status: 'active',
          why: 'If a region × platform × role pair doesn\u2019t meet all three, the tool substitutes the platform\u2019s role-wide average (still platform-specific) rather than using a potentially-spurious low number.',
          where: 'effectiveCPH() + platformRoleCPH()',
          revisit: 'Thresholds are conservative. Review if valid regions are being excluded.',
        },
        {
          label: 'Data window',
          value: 'Jul 2025 \u2013 Apr 2026',
          status: 'active',
          why: '10 months of RAC campaign data across all four platforms. Uses all-time aggregated stats per region × platform × role to maximise signal.',
          where: 'getRegionStats() reads DATA[...].all_time',
        },
      ],
    },
    {
      group: 'Platform minimums',
      items: [
        {
          label: 'Meta minimum \u2014 £1,500 per role',
          value: '\u00a31,500',
          status: 'active',
          why: 'Exposure floor for brand diversification. Applied on top of cheapest-CPH allocation; treated as commitment spend, not hire-optimised capacity.',
          where: 'DEFAULT_PLATFORM_MINIMUMS, applyPlatformMinimums()',
        },
        {
          label: 'Indeed minimum \u2014 £3,000 per role',
          value: '\u00a33,000',
          status: 'active',
          why: 'Exposure floor. Same principle as Meta \u2014 minimums are about platform presence, not CPH optimisation.',
          where: 'DEFAULT_PLATFORM_MINIMUMS',
        },
      ],
    },
  ];

  return (
    <>
      <div className="banner banner-info">
        <div className="banner-icon">i</div>
        <div className="banner-body">
          <strong>Internal reference &mdash; not shown in PDF exports.</strong> Every assumption, rate, and manual adjustment baked into the tool. If a number changes or a pattern surprises you, check here first.
        </div>
      </div>
      <div className="assumptions-wrap">
        {assumptions.map((grp, gi) => (
          <section className="assumption-group" key={gi}>
            <h2 className="assumption-group-title">{grp.group}</h2>
            <div className="assumption-list">
              {grp.items.map((it, ii) => (
                <div className="assumption-card" key={ii}>
                  <div className="assumption-card-head">
                    <div className="assumption-label">{it.label}</div>
                    <div className="assumption-value">{it.value}</div>
                  </div>
                  <div className="assumption-why"><span className="assumption-why-label">Why:</span> {it.why}</div>
                  {it.where && <div className="assumption-meta"><span className="assumption-meta-label">Lives in:</span> <code>{it.where}</code></div>}
                  {it.revisit && <div className="assumption-meta assumption-revisit"><span className="assumption-meta-label">Revisit:</span> {it.revisit}</div>}
                </div>
              ))}
            </div>
          </section>
        ))}
      </div>
    </>
  );
}



// ---------- Scenarios ----------
function ScenariosView({ scenarios, setScenarios, currentPlan, setPlan, setTab, monthKey }) {
  const { demand } = useDemand();
  const vacancies = demand.vacancies;
  const [newName, setNewName] = useState('');
  const [filterMonth, setFilterMonth] = useState('all');
  const saveScenario = () => {
    const name = newName.trim() || `${DATA.month_labels[monthKey]} · ${new Date().toLocaleDateString('en-GB')}`;
    setScenarios([...scenarios, {
      id: Date.now().toString(36), name, createdAt: new Date().toISOString(),
      monthKey, plan: JSON.parse(JSON.stringify(currentPlan)), }]);
    setNewName('');
  };
  const deleteScenario = (id) => { if (confirm('Delete this scenario?')) setScenarios(scenarios.filter(s => s.id !== id)); };
  const loadScenario = (s) => { setPlan(s.plan); setTab('dashboard'); };
  const filtered = filterMonth === 'all' ? scenarios : scenarios.filter(s => s.monthKey === filterMonth);
  const firstTwo = filtered.slice(0, 2);
  return (
    <>
      <div className="section">
        <div className="section-head">
          <div className="section-title">Saved scenarios</div>
          <div className="section-sub">Stored in this browser</div>
        </div>
        <div className="section-body">
          <div style={{display:'flex', gap:10, marginBottom:14, flexWrap:'wrap'}}>
            <input className="slider-input" style={{flex:1, maxWidth:320, padding:'8px 12px', fontSize:13, fontFamily:'Inter'}}
              placeholder="Scenario name" value={newName} onChange={e => setNewName(e.target.value)} />
            <button className="btn btn-primary" onClick={saveScenario}>Save current as scenario</button>
            <div style={{marginLeft:'auto', display:'flex', alignItems:'center', gap:8}}>
              <span className="toggle-label">Filter</span>
              <select value={filterMonth} onChange={e => setFilterMonth(e.target.value)}
                style={{padding:'7px 10px', border:'1px solid var(--line-strong)', borderRadius:6, fontFamily:'inherit', fontSize:12, background:'var(--card)'}}>
                <option value="all">All months</option>
                {DATA.month_options.map(m => <option key={m} value={m}>{DATA.month_labels[m]}</option>)}
              </select>
            </div>
          </div>
          {filtered.length === 0 && (
            <div className="small-meta">No scenarios yet{filterMonth !== 'all' ? ` for ${DATA.month_labels[filterMonth]}` : ''}.</div>
          )}
          {filtered.map(s => {
            const smr = PLATFORMS.reduce((a,p) => a + sumPlatformRole(s.plan, p, 'SMR'), 0);
            const pat = PLATFORMS.reduce((a,p) => a + sumPlatformRole(s.plan, p, 'Patrol'), 0);
            const smrH = totalPredictedHires(s.plan, 'SMR', vacancies);
            const patH = totalPredictedHires(s.plan, 'Patrol', vacancies);
            return (
              <div className="scenario-row" key={s.id}>
                <div>
                  <div style={{fontWeight:600, fontSize:14}}>{s.name}</div>
                  <div className="small-meta" style={{marginTop:2}}>{DATA.month_labels[s.monthKey]} · {new Date(s.createdAt).toLocaleString('en-GB')}</div>
                </div>
                <div className="mono" style={{fontSize:12.5}}>SMR {fmtGBP(smr)}</div>
                <div className="mono" style={{fontSize:12.5}}>Patrol {fmtGBP(pat)}</div>
                <div className="mono" style={{fontSize:12.5}}>{(smrH+patH).toFixed(1)} hires</div>
                <div>
                  <button className="btn btn-sm" onClick={() => loadScenario(s)}>Load</button>
                  <button className="btn btn-sm btn-ghost" onClick={() => deleteScenario(s.id)} style={{marginLeft:4, color:'var(--bad)'}}>Delete</button>
                </div>
              </div>
            );
          })}
        </div>
      </div>
      {firstTwo.length === 2 && (
        <div className="section">
          <div className="section-head">
            <div className="section-title">Diff — first two scenarios</div>
            <div className="section-sub">{firstTwo[0].name} vs {firstTwo[1].name}</div>
          </div>
          <div className="section-body section-body-flush">
            <table className="data-table">
              <thead><tr>
                <th>Region</th><th>A · SMR</th><th>A · Patrol</th><th>B · SMR</th><th>B · Patrol</th><th>Δ SMR</th><th>Δ Patrol</th>
              </tr></thead>
              <tbody>
                {DATA.regions_ordered.map(r => {
                  const getA = (k) => PLATFORMS.reduce((s,p) => s + (firstTwo[0].plan[p]?.[k]?.[r] || 0), 0);
                  const getB = (k) => PLATFORMS.reduce((s,p) => s + (firstTwo[1].plan[p]?.[k]?.[r] || 0), 0);
                  const a1 = getA('smr'), a2 = getA('patrol'), b1 = getB('smr'), b2 = getB('patrol');
                  return (
                    <tr key={r}>
                      <td>{r}</td>
                      <td>{fmtGBP(a1)}</td><td>{fmtGBP(a2)}</td>
                      <td>{fmtGBP(b1)}</td><td>{fmtGBP(b2)}</td>
                      <td style={{color: b1-a1 > 0 ? 'var(--good)' : b1-a1 < 0 ? 'var(--bad)' : 'var(--ink-35)'}}>{(b1-a1 > 0 ? '+' : '') + fmtGBP(b1 - a1)}</td>
                      <td style={{color: b2-a2 > 0 ? 'var(--good)' : b2-a2 < 0 ? 'var(--bad)' : 'var(--ink-35)'}}>{(b2-a2 > 0 ? '+' : '') + fmtGBP(b2 - a2)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </>
  );
}


// ---------- Onboarding tour ----------
function OnboardingTour({ setTab, onClose }) {
  const [step, setStep] = useState(0);
  const steps = [
    {
      title: 'Welcome to the RAC Media Planner',
      body: <>
        <p>Quick 5-step tour to orient you. This tool exists to answer two planning questions each month:</p>
        <ul>
          <li><strong>What budget do we need to fill every open role?</strong> (full-price reference)</li>
          <li><strong>Given our budget, where should it go?</strong> (the actual planning job)</li>
        </ul>
        <p>Everything else &mdash; benchmarks, scenarios, demand plan &mdash; supports those two questions. Click Next to get started.</p>
      </>,
      targetTab: 'dashboard',
    },
    {
      title: 'Dashboard',
      body: <>
        <p>Current month at a glance: budget, predicted hires, vacancies, target status. The <strong>Things to know</strong> panel auto-generates insights from the plan + historic data.</p>
        <p>Use the <strong>Role</strong> toggle (Combined / SMR / Patrol) in the header to filter everything.</p>
        <p><strong>Platform exposure baselines</strong> is where you set minimum spend floors for Indeed and Meta &mdash; expand that section to adjust.</p>
      </>,
      targetTab: 'dashboard',
    },
    {
      title: 'Demand Plan',
      body: <>
        <p>Every calculation reads from here. When RAC send an updated priorities file, update:</p>
        <ul>
          <li><strong>Open vacancies</strong> per region per role</li>
          <li><strong>Monthly hire targets</strong> per role</li>
          <li><strong>Plan source date</strong> (w/c) so the team knows when it was last refreshed</li>
        </ul>
        <p>Edited cells tint orange so you can see what changed vs the uploaded baseline.</p>
      </>,
      targetTab: 'demand',
    },
    {
      title: 'Allocation',
      body: <>
        <p>Two strategies, click to apply across every platform and region at once:</p>
        <ul>
          <li><strong>A &mdash; Theoretical fill cost (reference only):</strong> what it <em>would</em> cost if every region hired at its cheapest historic CPH. Don&rsquo;t use as a plan &mdash; it ignores diminishing returns and small-sample noise in the data. Treat as a lower-bound benchmark.</li>
          <li><strong>B &mdash; Max hires (recommended):</strong> given a fixed budget (editable), water-fill from most efficient slot first. This is what to use for actual allocation.</li>
        </ul>
        <p>After applying a strategy, fine-tune any region with the sliders. Lock a region to stop it moving when you rebalance.</p>
      </>,
      targetTab: 'allocation',
    },
    {
      title: 'Scenarios & sharing',
      body: <>
        <p>Save a named version of your plan any time — useful for comparing baseline vs ambitious budgets, checking before/after a demand plan change, or presenting options to RAC.</p>
        <p>For data deep-dives, <strong>Benchmarks</strong> is the main view: platform roll-ups, region roll-ups, heat-map pivot, and monthly trend drill-down. <strong>Indeed Premium</strong> surfaces which regions benefit most from Premium placement.</p>
        <p>The <strong>PDF</strong> button top-right exports whatever you&rsquo;re currently looking at. You&rsquo;re set &mdash; click Finish and start planning.</p>
      </>,
      targetTab: 'scenarios',
    },
  ];
  const current = steps[step];
  const isLast = step === steps.length - 1;
  useEffect(() => { setTab(steps[step].targetTab); }, [step]);
  const next = () => {
    if (isLast) { localStorage.setItem('rac-tour-completed', '1'); onClose(); }
    else { setStep(step + 1); }
  };
  const prev = () => { if (step > 0) setStep(step - 1); };
  const skip = () => { localStorage.setItem('rac-tour-completed', '1'); onClose(); };
  return (
    <>
      <div className="tour-backdrop" onClick={skip} />
      <div className="tour-modal">
        <div className="tour-step-count">Step {step + 1} of {steps.length}</div>
        <h2 className="tour-title">{current.title}</h2>
        <div className="tour-body">{current.body}</div>
        <div className="tour-progress">
          {steps.map((_, i) => (
            <div key={i} className={"tour-dot " + (i === step ? 'active' : i < step ? 'done' : '')} />
          ))}
        </div>
        <div className="tour-buttons">
          <button className="skip" onClick={skip}>Skip tour</button>
          {step > 0 && <button className="btn btn-sm" onClick={prev}>Back</button>}
          <button className="btn btn-sm btn-primary" onClick={next}>
            {isLast ? 'Start planning' : 'Next'}
          </button>
        </div>
      </div>
    </>
  );
}

// ---------- App shell ----------
function AppInner() {
  const { demand } = useDemand();
  const [monthKey, setMonthKey] = useState(() => localStorage.getItem('rac-current-month') || DATA.default_month);
  const [roleView, setRoleView] = useState('Combined');
  const [tab, setTab] = useState('dashboard');
  const [minimums, setMinimums] = useState(() => loadPlatformMinimums());
  const [plan, setPlan] = useState(() => loadPlan(monthKey, demand, loadPlatformMinimums()));
  // Track which strategy generated the current plan per role — 'fill' | 'max' | 'custom' | 'none'
  const [planStrategy, setPlanStrategyState] = useState(() => {
    const saved = localStorage.getItem('rac-plan-strategy-v1');
    try { return saved ? JSON.parse(saved) : { SMR: 'none', Patrol: 'none' }; }
    catch { return { SMR: 'none', Patrol: 'none' }; }
  });
  const setPlanStrategy = (next) => {
    setPlanStrategyState(next);
    localStorage.setItem('rac-plan-strategy-v1', JSON.stringify(next));
  };
  const applyStrategyForRole = (role, kind, budget) => {
    const roleKey = role.toLowerCase();
    let result;
    if (kind === 'fill') {
      // Fill All ignores hold-backs — its budget is the true cost to fill every
      // vacancy at cheapest CPH. The Premium + Non-Standard ride on top when
      // reported, not baked into the fill math.
      result = strategyHitTarget(role, monthKey, demand.hireTargets, demand.vacancies, minimums);
      // Fill All doesn't commit hold-backs — clear any prior snapshot so the
      // Dashboard/PDF won't try to add stale Premium + A&C to a Fill All plan.
      saveAppliedHoldbacks(monthKey, role, null);
    } else if (kind === 'max') {
      const b = typeof budget === 'number' ? budget : loadMaxBudget(monthKey, role);
      // Deduct hold-backs before the strategy sees the budget. The strategy
      // allocates only what's deployable to platforms × regions.
      const hb = computeHoldbacks(role, b, monthKey);
      result = strategyMaxHires(role, hb.deployable, demand.vacancies, minimums);
      // Snapshot the hold-back state. Dashboard + PDF read this, not the live
      // settings, so they always reflect what was committed to the plan.
      saveAppliedHoldbacks(monthKey, role, {
        budget: b,
        premium: hb.premium,
        premiumCampaigns: hb.premiumCampaigns,
        nonStandard: hb.nonStandard,
        appliedAt: new Date().toISOString(),
      });
    } else {
      return;
    }
    setPlan(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      PLATFORMS.forEach(p => { next[p][roleKey] = result.platformSplit[p]; });
      return next;
    });
    setPlanStrategy({ ...planStrategy, [role]: kind });
  };
  const resetStrategyForRole = (role) => {
    const briefed = getMonthBriefBudget(monthKey, role);
    saveMaxBudget(monthKey, role, briefed);
    applyStrategyForRole(role, 'max', briefed);
  };
  const [tourOpen, setTourOpen] = useState(() => !localStorage.getItem('rac-tour-completed'));
  const [scenarios, setScenarios] = useState(() => {
    const saved = localStorage.getItem('rac-scenarios-v4');
    return saved ? JSON.parse(saved) : [];
  });
  useEffect(() => {
    setPlan(loadPlan(monthKey, demand, minimums));
    localStorage.setItem('rac-current-month', monthKey);
  }, [monthKey]);
  useEffect(() => { localStorage.setItem(`rac-plan-v4-${monthKey}`, JSON.stringify(plan)); }, [plan, monthKey]);
  useEffect(() => { localStorage.setItem('rac-scenarios-v4', JSON.stringify(scenarios)); }, [scenarios]);
  const handleSave = () => {
    const name = prompt('Name this scenario:', `${DATA.month_labels[monthKey]} — ${new Date().toLocaleDateString('en-GB')}`);
    if (!name) return;
    setScenarios(prev => [...prev, {
      id: Date.now().toString(36), name: name.trim(), createdAt: new Date().toISOString(),
      monthKey, plan: JSON.parse(JSON.stringify(plan)),
    }]);
    alert('Saved: ' + name);
  };
  const handleLoad = () => setTab('scenarios');
  return (
    <div className="app-shell">
      {tourOpen && <OnboardingTour setTab={setTab} onClose={() => setTourOpen(false)} />}
      <Sidebar tab={tab} setTab={setTab} />
      <div className="content">
        <SubHeader
          monthKey={monthKey} setMonthKey={setMonthKey}
          roleView={roleView} setRoleView={setRoleView}
          onSaveClick={handleSave} onLoadClick={handleLoad}
          onExportClick={(variant) => exportDashboardPDF(monthKey, plan, minimums, variant || 'internal')}
        />
        <div className="main">
          {tab === 'dashboard' && <Dashboard plan={plan} monthKey={monthKey} setTab={setTab} setRoleView={setRoleView} roleView={roleView} minimums={minimums} setMinimums={setMinimums} planStrategy={planStrategy} applyStrategyForRole={applyStrategyForRole} resetStrategyForRole={resetStrategyForRole} />}
          {tab === 'allocation' && <AllocationBuilder plan={plan} setPlan={setPlan} roleView={roleView} setRoleView={setRoleView} monthKey={monthKey} minimums={minimums} setMinimums={setMinimums} planStrategy={planStrategy} setPlanStrategy={setPlanStrategy} applyStrategyForRole={applyStrategyForRole} resetStrategyForRole={resetStrategyForRole} />}
          {tab === 'targets' && <BenchmarksView roleView={roleView} plan={plan} monthKey={monthKey} />}
          {tab === 'demand' && <DemandPlanView />}
          {tab === 'benchmarks' && <BenchmarksView roleView={roleView} plan={plan} monthKey={monthKey} />}
          {tab === 'assumptions' && <AssumptionsView />}
          {tab === 'scenarios' && <ScenariosView
            scenarios={scenarios} setScenarios={setScenarios}
            currentPlan={plan}
            setPlan={setPlan} setTab={setTab}
            monthKey={monthKey}
          />}
        </div>
        <div className="app-footer">
          RAC Media Budget Planner · Delivered by <strong>Enhance Media</strong> · Historic Jul 25 – Apr 26 · Indeed + Meta + Google + Appcast · Demand Plan {new Date(demand.planDate).toLocaleDateString('en-GB')}
        </div>
      </div>
    </div>
  );
}
function loadPlan(monthKey, demand, minimums) {
  const saved = localStorage.getItem(`rac-plan-v4-${monthKey}`);
  if (saved) {
    try {
      const p = JSON.parse(saved);
      if (p.indeed && p.meta && p.google && p.appcast) return p;
    } catch {}
  }
  return buildDefaultPlan(monthKey, demand.vacancies, demand.hireTargets, minimums);
}
function App() { return <DemandProvider><AppInner /></DemandProvider>; }
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
